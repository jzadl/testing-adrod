name: Build CyanogenMod 14.1 for Samsung J7 Neo

on:
  workflow_dispatch:
    inputs:
      android_version:
        description: 'Android version'
        required: true
        default: '14.1'
        type: choice
        options:
          - '14.1'

env:
  DEVICE: j7velte
  CM_VERSION: 14.1
  CM_BRANCH: cm-14.1

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          echo "=== Disk space before cleanup ==="
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          docker image prune -af
          echo "=== Disk space after cleanup ==="
          df -h

      - name: Setup Python 2
        run: |
          sudo apt-get update && sudo apt-get install -y python2
          sudo ln -sf /usr/bin/python2 /usr/bin/python
          python --version

      - name: Setup Java 8
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '8'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc bison build-essential ccache curl flex g++-multilib gcc-multilib \
            git git-lfs gnupg gperf imagemagick lib32readline-dev lib32z1-dev \
            libelf-dev liblz4-tool libncurses5 libsdl1.2-dev libssl-dev \
            libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools \
            xsltproc zip zlib1g-dev libtinfo5 libncurses5

      - name: Configure ccache
        run: |
          mkdir -p ~/.ccache
          echo "max_size = 10G" > ~/.ccache/ccache.conf
          echo "compiler_check = content" >> ~/.ccache/ccache.conf

      - name: Setup repo tool
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Configure git
        run: |
          git config --global user.email "ci@cyanogenmod.build"
          git config --global user.name "CyanogenMod CI"
          git config --global color.ui false

      - name: Initialize CyanogenMod manifest
        run: |
          mkdir -p android/cm
          cd android/cm
          repo init -u https://github.com/CyanogenMod/android.git \
            -b cm-14.1 \
            --depth=1

      - name: Add custom device manifests
        run: |
          mkdir -p android/cm/.repo/local_manifests
          cat > android/cm/.repo/local_manifests/j7velte.xml << 'MANIFEST_EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <manifest>

            <!-- Device tree (the only one with cm-14.1 branch) -->
            <project name="J0SH1X/android_device_samsung_j7velte"
                     path="device/samsung/j7velte"
                     remote="github"
                     revision="cm-14.1" />

            <!-- Kernel (use samsungexynos7870 kernel, map to j7velte path) -->
            <project name="samsungexynos7870/android_kernel_samsung_exynos7870"
                     path="kernel/samsung/j7velte"
                     remote="github"
                     revision="master" />

            <!-- Hardware - Samsung (CyanogenMod repos with cm-14.1) -->
            <project name="CyanogenMod/android_hardware_samsung"
                     path="hardware/samsung"
                     remote="github"
                     revision="cm-14.1" />

            <!-- Hardware - Samsung SLSI Exynos (cm-14.1) -->
            <project name="CyanogenMod/android_hardware_samsung_slsi-cm_exynos"
                     path="hardware/samsung_slsi-cm/exynos"
                     remote="github"
                     revision="cm-14.1" />

            <!-- Hardware - Samsung SLSI Exynos5 (cm-14.1) -->
            <project name="CyanogenMod/android_hardware_samsung_slsi-cm_exynos5"
                     path="hardware/samsung_slsi-cm/exynos5"
                     remote="github"
                     revision="cm-14.1" />

            <!-- Hardware - Samsung SLSI OpenMAX (cm-14.1) -->
            <project name="CyanogenMod/android_hardware_samsung_slsi-cm_openmax"
                     path="hardware/samsung_slsi-cm/openmax"
                     remote="github"
                     revision="cm-14.1" />

            <!-- Vendor blobs - device specific (may need adaptation) -->
            <project name="samsungexynos7870/android_vendor_samsung_j7velte"
                     path="vendor/samsung/j7velte"
                     remote="github"
                     revision="common" />

          </manifest>
          MANIFEST_EOF

      - name: Sync source code
        run: |
          cd android/cm
          repo sync -c -j$(nproc --all) \
            --force-sync \
            --no-clone-bundle \
            --no-tags \
            --optimized-fetch \
            --prune \
            --force-remove-dirty

      - name: Fix kernel defconfig
        run: |
          cd android/cm
          if [ ! -f kernel/samsung/j7velte/arch/arm64/configs/lineage-j7velte_defconfig ]; then
            echo "lineage-j7velte_defconfig not found, creating from defconfig"
            cp kernel/samsung/j7velte/arch/arm64/configs/defconfig kernel/samsung/j7velte/arch/arm64/configs/lineage-j7velte_defconfig
          fi

      - name: Setup build environment
        run: |
          cd android/cm
          source build/envsetup.sh
          echo "BUILD_ENV_SETUP=1" >> $GITHUB_ENV

      - name: Build CyanogenMod
        run: |
          cd android/cm
          export LC_ALL=C
          export WITHOUT_CHECK_API=true
          source build/envsetup.sh
          lunch cm_${{ env.DEVICE }}-userdebug
          mka bacon -j$(nproc --all) 2>&1 | tee build.log
        env:
          USE_CCACHE: 1
          CCACHE_EXEC: /usr/bin/ccache
          CCACHE_DIR: ~/.ccache

      - name: Prepare Release Artifacts
        if: success()
        run: |
          mkdir -p release_assets
          cp android/cm/out/target/product/${{ env.DEVICE }}/*.zip release_assets/ 2>/dev/null || true
          cp android/cm/out/target/product/${{ env.DEVICE }}/recovery.img release_assets/ 2>/dev/null || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          tag_name: cm-${{ env.CM_VERSION }}-${{ env.DEVICE }}-build${{ github.run_number }}
          name: CyanogenMod ${{ env.CM_VERSION }} for ${{ env.DEVICE }} (#${{ github.run_number }})
          body: |
            Automated CyanogenMod 14.1 build for the Samsung J7 Neo (${{ env.DEVICE }}).
            - Build Number: ${{ github.run_number }}
            - Commit Reference: ${{ github.sha }}
          draft: false
          prerelease: false
          files: |
            release_assets/*

      - name: Upload build log on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-log-${{ github.run_number }}
          path: android/cm/build.log
          retention-days: 7
