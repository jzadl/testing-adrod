name: Build AEX for Samsung J7 Neo

on:
  workflow_dispatch:
    inputs:
      android_version:
        description: 'Android version'
        required: true
        default: '9'
        type: choice
        options:
          - '9'

env:
  DEVICE: j7velte
  ROM_VERSION: AEX-9.0

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          echo "=== Disk space before cleanup ==="
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          docker image prune -af
          echo "=== Disk space after cleanup ==="
          df -h

      - name: Setup Python 2
        run: |
          sudo apt-get update && sudo apt-get install -y python2
          sudo ln -sf /usr/bin/python2 /usr/bin/python
          python --version

      - name: Setup Java 8
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '8'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc bison build-essential ccache curl flex g++-multilib gcc-multilib \
            git git-lfs gnupg gperf imagemagick lib32readline-dev lib32z1-dev \
            libelf-dev liblz4-tool libncurses5 libsdl1.2-dev libssl-dev \
            libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools \
            xsltproc zip zlib1g-dev libtinfo5 libncurses5

      - name: Configure ccache
        run: |
          mkdir -p ~/.ccache
          echo "max_size = 10G" > ~/.ccache/ccache.conf
          echo "compiler_check = content" >> ~/.ccache/ccache.conf

      - name: Setup repo tool
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Configure git
        run: |
          git config --global user.email "ci@aex.build"
          git config --global user.name "AEX CI"
          git config --global color.ui false

      - name: Initialize AEX manifest
        run: |
          mkdir -p android
          cd android
          repo init -u https://github.com/AospExtended/manifest.git \
            -b 9.x \
            --depth=1

      - name: Add custom device manifests
        run: |
          mkdir -p android/.repo/local_manifests
          cat > android/.repo/local_manifests/j7velte.xml << 'MANIFEST_EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <manifest>
            <!-- Device tree -->
            <project name="samsungexynos7870/android_device_samsung_j7velte"
                     path="device/samsung/j7velte"
                     remote="github"
                     revision="aex" />

            <!-- Common device tree -->
            <project name="samsungexynos7870/android_device_samsung_universal7870-common"
                     path="device/samsung/universal7870-common"
                     remote="github"
                     revision="aex" />

            <!-- Kernel -->
            <project name="samsungexynos7870/android_kernel_samsung_exynos7870"
                     path="kernel/samsung/exynos7870"
                     remote="github"
                     revision="master" />

            <!-- Vendor blobs - device specific -->
            <project name="samsungexynos7870/android_vendor_samsung_j7velte"
                     path="vendor/samsung/j7velte"
                     remote="github"
                     revision="common" />

            <!-- Vendor blobs - common -->
            <project name="samsungexynos7870/android_vendor_samsung_universal7870-common"
                     path="vendor/samsung/universal7870-common"
                     remote="github"
                     revision="common" />

            <!-- Hardware - Samsung -->
            <project name="samsungexynos7870/android_hardware_samsung"
                     path="hardware/samsung"
                     remote="github"
                     revision="lineage-17.1" />

            <!-- Hardware - Samsung SLSI Exynos -->
            <project name="samsungexynos7870/android_hardware_samsung_slsi_exynos"
                     path="hardware/samsung_slsi/exynos"
                     remote="github"
                     revision="lineage-17.1" />

            <!-- Hardware - Samsung SLSI Exynos7870 -->
            <project name="samsungexynos7870/android_hardware_samsung_slsi_exynos7870"
                     path="hardware/samsung_slsi/exynos7870"
                     remote="github"
                     revision="lineage-17.1" />

            <!-- Samsung OpenMAX -->
            <project name="samsungexynos7870/android_hardware_samsung_slsi_openmax"
                     path="hardware/samsung_slsi/openmax"
                     remote="github"
                     revision="lineage-17.1" />
          </manifest>
          MANIFEST_EOF

      - name: Sync source code
        run: |
          cd android
          repo sync -c -j$(nproc --all) \
            --force-sync \
            --no-clone-bundle \
            --no-tags \
            --optimized-fetch \
            --prune \
            --force-remove-dirty

      - name: Setup build environment
        run: |
          cd android
          source build/envsetup.sh
          echo "BUILD_ENV_SETUP=1" >> $GITHUB_ENV

      - name: Build AEX
        run: |
          cd android
          export LC_ALL=C
          source build/envsetup.sh
          lunch aosp_${{ env.DEVICE }}-userdebug
          make bacon -j$(nproc --all) 2>&1 | tee build.log
        env:
          USE_CCACHE: 1
          CCACHE_EXEC: /usr/bin/ccache
          CCACHE_DIR: ~/.ccache

      - name: Prepare Release Artifacts
        if: success()
        run: |
          mkdir -p release_assets
          cp android/out/target/product/${{ env.DEVICE }}/*.zip release_assets/ 2>/dev/null || true
          cp android/out/target/product/${{ env.DEVICE }}/recovery.img release_assets/ 2>/dev/null || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          tag_name: aex-${{ env.DEVICE }}-build${{ github.run_number }}
          name: AEX 9.0 for ${{ env.DEVICE }} (#${{ github.run_number }})
          body: |
            Automated AEX (Android 9) build for the Samsung J7 Neo (${{ env.DEVICE }}).
            - Build Number: ${{ github.run_number }}
            - Commit Reference: ${{ github.sha }}
          draft: false
          prerelease: false
          files: |
            release_assets/*

      - name: Upload build log on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-log-${{ github.run_number }}
          path: android/build.log
          retention-days: 7
