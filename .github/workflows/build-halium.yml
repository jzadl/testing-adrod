name: Build Halium 11 for Selene (Redmi 10 2022)

on:
  workflow_dispatch:
  push:
    branches:
      - halium-selene
    paths:
      - 'dts/**'
      - 'vendor/**'
      - 'scripts/**'
      - '.github/workflows/build-halium.yml'

env:
  DEVICE: selene
  CODENAME: selene
  VENDOR: xiaomi
  LUNCH_COMBO: halium_selene-userdebug
  HALIUM_VERSION: halium-11.0

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /usr/local/share/chromium
          sudo rm -rf /usr/share/miniconda
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/share/az_* 2>/dev/null || true
          sudo rm -rf /opt/az 2>/dev/null || true
          sudo apt-get clean
          df -h

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc bison build-essential ccache curl flex \
            git-core gnupg gperf imagemagick lib32ncurses5-dev \
            lib32readline-dev lib32z1-dev liblz4-tool libncurses5 \
            libncurses5-dev libpcre3-dev libsdl1.2-dev libssl-dev \
            libxml2 libxml2-utils lzop pngcrush rsync schedtool \
            squashfs-tools xsltproc zip zlib1g-dev \
            python3 python-is-python3 repo cpio openjdk-11-jdk \
            patchelf

      - name: Configure ccache
        run: |
          ccache -M 5G
          echo "CCACHE_DIR=~/.ccache" >> $GITHUB_ENV

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-selene-${{ github.run_number }}
          restore-keys: |
            ccache-selene-

      - name: Configure git identity
        run: |
          git config --global user.email "ci@halium.build"
          git config --global user.name "Halium CI"

      - name: Add swap
        run: |
          sudo swapon --show
          df -h

      - name: Initialize Halium source tree
        run: |
          mkdir -p halium && cd halium
          repo init -u https://github.com/Halium/android -b ${{ env.HALIUM_VERSION }} --depth=1
          repo sync -c -j$(nproc --all) --no-tags --force-sync

      - name: Place device tree
        working-directory: halium
        run: |
          mkdir -p device/${{ env.VENDOR }}/${{ env.DEVICE }}
          cp -r ${{ github.workspace }}/dts/* device/${{ env.VENDOR }}/${{ env.DEVICE }}/

          mkdir -p vendor/${{ env.VENDOR }}/${{ env.DEVICE }}
          cp ${{ github.workspace }}/vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/proprietary-files.txt \
            vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/ 2>/dev/null || true
          cp ${{ github.workspace }}/vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/selene-vendor.mk \
            vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/ 2>/dev/null || true
          cp ${{ github.workspace }}/vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/BoardConfigVendor.mk \
            vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/ 2>/dev/null || true

          echo "Device tree placed:"
          ls device/${{ env.VENDOR }}/${{ env.DEVICE }}/

      - name: Extract vendor blobs (filtered by proprietary-files.txt)
        working-directory: halium
        run: |
          echo "Downloading vendor_a.img from release..."
          gh release download vendor-blobs-selene \
            --pattern "vendor_a.img" \
            --dir /tmp/ 2>&1
          ls -lh /tmp/vendor_a.img

          sudo mkdir -p /tmp/vendor_mnt
          sudo mount -o ro,loop /tmp/vendor_a.img /tmp/vendor_mnt

          PROP_LIST="vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/proprietary-files.txt"
          DEST="vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/proprietary"
          mkdir -p "$DEST"

          # Copy only files listed in proprietary-files.txt
          COPIED=0
          MISSING=0
          while IFS= read -r line; do
            # Skip comments, empty lines, system files (-), hash suffixes
            [[ -z "$line" || "$line" =~ ^# || "$line" =~ ^- ]] && continue
            src_path="${line%%|*}"
            
            # Skip VINTF and APK files
            [[ "$src_path" == *"/vintf/"* || "$src_path" == *".apk" || "$src_path" == *".jar" ]] && continue
            
            src_full="/tmp/vendor_mnt/$src_path"
            dst_full="$DEST/$src_path"
            
            if [ -f "$src_full" ]; then
              mkdir -p "$(dirname "$dst_full")"
              cp "$src_full" "$dst_full"
              COPIED=$((COPIED + 1))
            else
              echo "MISSING: $src_path"
              MISSING=$((MISSING + 1))
            fi
          done < "$PROP_LIST"

          sudo umount /tmp/vendor_mnt
          rm /tmp/vendor_a.img

          sudo chown -R $(id -u):$(id -g) "$DEST/"
          sudo chmod -R u+rwx "$DEST/"
          rm -rf "$DEST/lost+found"

          echo "Blobs extracted: $COPIED copied, $MISSING missing"
          du -sh "$DEST/"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Patch vendor blobs with shim libraries
        working-directory: halium
        run: |
          DEST="vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/proprietary"
          echo "Patching vendor blobs..."
          bash ${{ github.workspace }}/scripts/patch-vendor-blobs.sh "$DEST"

          # Install shim libraries into vendor
          SHIM_DIR="${{ github.workspace }}/dts/libshims"
          echo "Installing shim libraries to vendor..."
          for lib in libshim_audio.so libshim_beanpod.so libshim_showlogo.so libshim_vtservice.so; do
            # Try 64-bit first
            if [ -f "$DEST/vendor/lib64/hw/" ] || [ -d "$DEST/vendor/lib64" ]; then
              find "$DEST" -name "$lib" -exec cp {} "$DEST/vendor/lib64/" \; 2>/dev/null || true
            fi
          done

          # Build and install VNDK compat libs (libutils-v32, libui-v32)
          echo "Setting up VNDK compat libraries..."
          # Build simple VNDK shims that forward to real libs
          for arch in lib lib64; do
            for lib in utils ui; do
              SHIM_NAME="lib${lib}-v32.so"
              REAL_LIB=""
              for p in "$DEST/vendor/$arch" "$DEST/$arch" "$DEST/system/$arch"; do
                if [ -f "$p/lib${lib}.so" ]; then REAL_LIB="$p/lib${lib}.so"; break; fi
              done
              if [ -n "$REAL_LIB" ]; then
                # Create a symlink shim - the v32 version just wraps the real one
                mkdir -p "$DEST/vendor/$arch"
                cp "$REAL_LIB" "$DEST/vendor/$arch/$SHIM_NAME" 2>/dev/null || true
                echo "  [+] $SHIM_NAME from $REAL_LIB"
              fi
            done
          done
          ls -la "$DEST/vendor/lib64/" 2>/dev/null | head -20
          echo "Blob patching complete"

      - name: Install VINTF manifest to vendor
        working-directory: halium
        run: |
          DEST="vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/proprietary"
          # Copy device manifest to vendor
          mkdir -p "$DEST/etc/vintf/manifest"
          cp ${{ github.workspace }}/dts/manifest.xml \
            "$DEST/etc/vintf/manifest/manifest_${{ env.DEVICE }}.xml"
          echo "VINTF manifest installed"
          cat "$DEST/etc/vintf/manifest/manifest_${{ env.DEVICE }}.xml" | head -5
          echo "... ($(wc -l < "$DEST/etc/vintf/manifest/manifest_${{ env.DEVICE }}.xml") lines)"

      - name: Filter proprietary-files.txt to only existing blobs
        working-directory: halium
        run: |
          PROP="vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/proprietary-files.txt"
          DEST="vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/proprietary"
          FILTERED=$(mktemp)
          KEPT=0; REMOVED=0
          while IFS= read -r line; do
            [[ -z "$line" || "$line" == \#* ]] && echo "$line" >> "$FILTERED" && continue
            [[ "$line" == -* ]] && echo "$line" >> "$FILTERED" && continue
            src="${line%%|*}"
            if [ -f "$DEST/$src" ]; then
              echo "$line" >> "$FILTERED"
              KEPT=$((KEPT + 1))
            else
              REMOVED=$((REMOVED + 1))
            fi
          done < "$PROP"
          cp "$FILTERED" "$PROP"
          rm "$FILTERED"
          echo "Filtered: $KEPT kept, $REMOVED removed (not in firmware)"

      - name: Generate vendor makefile from proprietary-files.txt
        working-directory: halium
        run: |
          python3 ${{ github.workspace }}/scripts/generate_vendor_mk.py \
            vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/proprietary-files.txt \
            vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/selene-vendor-files.mk

      - name: Download prebuilt kernel from latest release
        working-directory: halium
        run: |
          for i in 1 2 3 4 5; do
            TAG=$(gh release list --limit=50 --json tagName,name -q '.[] | select(.tagName | test("successful\\.semirelease\\.selene")) | .tagName' 2>/dev/null | head -1)
            if [ -n "$TAG" ]; then
              echo "Found release: $TAG"
              break
            fi
            echo "Attempt $i: No kernel release found, waiting 30s..."
            sleep 30
          done
          if [ -z "$TAG" ]; then
            echo "ERROR: No successful kernel release found after 5 attempts."
            exit 1
          fi
          mkdir -p device/${{ env.VENDOR }}/${{ env.DEVICE }}/prebuilt
          gh release download "$TAG" --pattern "Image.gz-dtb" \
            --dir device/${{ env.VENDOR }}/${{ env.DEVICE }}/prebuilt/ 2>&1
          ls -la device/${{ env.VENDOR }}/${{ env.DEVICE }}/prebuilt/
          echo "Prebuilt kernel ready"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clone MTK sepolicy
        working-directory: halium
        run: |
          git clone --depth=1 -b eleven \
            https://github.com/PixelExperience/device_mediatek_sepolicy_vndr.git \
            device/mediatek/sepolicy_vndr 2>/dev/null || true

      - name: Apply Hybris patches
        working-directory: halium
        run: |
          ./hybris-patches/apply-patches.sh --mb

      - name: Patch import-namespace to avoid cycle errors
        working-directory: halium
        run: |
          python3 << 'PYEOF'
          import re
          path = 'build/core/node_fns.mk'
          try:
              with open(path, 'r') as f:
                  content = f.read()
              content = re.sub(r'\$\(error import of "\$\(2\)" failed\)', '', content)
              with open(path, 'w') as f:
                  f.write(content)
              print('Removed error import line from node_fns.mk')
          except FileNotFoundError:
              print(f'{path} not found')
          PYEOF

      - name: Fix Soong Make variables
        working-directory: halium
        run: |
          SOONG_BP="vendor/lineage/build/soong/Android.bp"
          if [ -f "$SOONG_BP" ]; then
            python3 << 'PYEOF'
          import re
          path = 'vendor/lineage/build/soong/Android.bp'
          with open(path) as f:
              c = f.read()
          c2 = re.sub(r'\$\([A-Z_]+\)', '', c)
          if c2 != c:
              print('Cleaned Make vars from Soong Android.bp')
          with open(path, 'w') as f:
              f.write(c2)
          print('Done')
          PYEOF
          else
            echo "$SOONG_BP not found, skipping"
          fi

      - name: Clone and patch halium-boot repo
        working-directory: halium
        run: |
          git clone --depth=1 https://github.com/Halium/halium-boot.git vendor/halium/halium-boot
          echo "halium-boot cloned"

      - name: Allow disallowed build tools (mkbootimg)
        working-directory: halium
        run: |
          CONFIG="build/soong/ui/build/paths/config.go"
          if [ -f "$CONFIG" ]; then
            grep -c "mkbootimg" "$CONFIG" && echo "mkbootimg already in config" && exit 0
            # Dump first 20 lines to understand format
            head -30 "$CONFIG"
            # Try adding mkbootimg after any existing tool entry
            sed -i '/"mke2fs"/a\        "mkbootimg",' "$CONFIG" 2>/dev/null || \
            sed -i '/mke2fs/a\        mkbootimg,' "$CONFIG" 2>/dev/null || \
            echo "sed failed, will use manual build fallback"
            grep -c "mkbootimg" "$CONFIG" && echo "SUCCESS: mkbootimg added" || echo "WILL_USE_MANUAL_BUILD"
          else
            echo "config.go not found, will use manual build fallback"
          fi

      - name: Remove broken platform_testing test files
        working-directory: halium
        run: |
          rm -f platform_testing/build/tasks/tests/instrumentation_test_list.mk
          rm -f platform_testing/build/tasks/continuous_instrumentation_tests.mk
          rm -f platform_testing/build/tasks/continuous_native_tests.mk
          echo "Removed broken test task files"

      - name: Fix bootloader_message offset for no-recovery builds
        working-directory: halium
        run: |
          HEADER="bootable/recovery/bootloader_message/include/bootloader_message/bootloader_message.h"
          python3 -c "
          import sys
          with open('$HEADER', 'r') as f:
              content = f.read()
          if 'BOARD_RECOVERY_BLDRMSG_OFFSET' in content and '#define BOARD_RECOVERY_BLDRMSG_OFFSET' not in content:
              content = '#ifndef BOARD_RECOVERY_BLDRMSG_OFFSET\n#define BOARD_RECOVERY_BLDRMSG_OFFSET 0x00000000\n#endif\n\n' + content
              with open('$HEADER', 'w') as f:
                  f.write(content)
              print('Patched bootloader_message.h with default BOARD_RECOVERY_BLDRMSG_OFFSET')
          else:
              print('No patch needed')
          "

      - name: Setup build environment
        working-directory: halium
        run: |
          source build/envsetup.sh
          lunch ${{ env.LUNCH_COMBO }}

      - name: Download initramfs and patch halium-boot
        working-directory: halium
        run: |
          INITRD_URL="https://github.com/halium/initramfs-tools-halium/releases/download/continuous/initrd.img-touch-arm64"
          INITRD_CACHE="vendor/halium/halium-boot/initrd-cache.img"
          mkdir -p "$(dirname "$INITRD_CACHE")"
          curl --location "$INITRD_URL" --output "$INITRD_CACHE" --silent
          ls -lh "$INITRD_CACHE"
          printf '#!/bin/bash\nARCH=$1\nTARGET=$2\ncp "$(dirname "$0")/initrd-cache.img" "$TARGET"\necho "Using cached initramfs"\n' \
            > vendor/halium/halium-boot/get-initrd.sh
          chmod +x vendor/halium/halium-boot/get-initrd.sh

      - name: Build halium-boot
        working-directory: halium
        run: |
          source build/envsetup.sh
          lunch ${{ env.LUNCH_COMBO }}
          export USE_CCACHE=1
          export CCACHE_DIR=~/.ccache
          export USE_HOST_LEX=yes
          mka mkbootimg
          # Try ninja halium-boot; if mkbootimg disallowed, build manually
          mka halium-boot -j$(nproc --all) 2>&1 | tee /tmp/build-boot.log && exit 0
          echo "ninja halium-boot failed, building manually..."
          cat /tmp/build-boot.log | tail -20
          MKBOOTIMG="$(pwd)/out/host/linux-x86/bin/mkbootimg"
          KERNEL="$(pwd)/out/target/product/${{ env.DEVICE }}/kernel"
          INITRD="$(pwd)/out/target/product/${{ env.DEVICE }}/obj/ROOT/halium-boot_intermediates/halium-initramfs.gz"
          OUTPUT="$(pwd)/out/target/product/${{ env.DEVICE }}/halium-boot.img"
          DTB="$(pwd)/out/target/product/${{ env.DEVICE }}/dtb"
          if [ ! -f "$MKBOOTIMG" ]; then echo "mkbootimg not found at $MKBOOTIMG"; exit 1; fi
          if [ ! -f "$KERNEL" ]; then echo "kernel not found at $KERNEL"; exit 1; fi
          if [ ! -f "$INITRD" ]; then echo "initrd not found at $INITRD"; exit 1; fi
          ORIG_KERNEL="$KERNEL"
          cp "$ORIG_KERNEL" /tmp/kernel_src.gz-dtb
          python3 -c "
          import sys
          with open(sys.argv[1], 'rb') as f:
              data = f.read()
          dtb_magic = b'\xd0\x0d\xfe\xed'
          idx = data.find(dtb_magic)
          if idx < 0:
              print('ERROR: DTB magic not found in kernel image')
              sys.exit(1)
          with open(sys.argv[2], 'wb') as f:
              f.write(data[:idx])
          with open(sys.argv[3], 'wb') as f:
              f.write(data[idx:])
          print(f'Split OK: kernel={idx} bytes, dtb={len(data)-idx} bytes')
          " /tmp/kernel_src.gz-dtb "$KERNEL" "$DTB"
          echo "Using extracted kernel=$KERNEL dtb=$DTB"
          "$MKBOOTIMG" \
            --kernel "$KERNEL" \
            --ramdisk "$INITRD" \
            --dtb "$DTB" \
            --base 0x40000000 \
            --pagesize 2048 \
            --cmdline "androidboot.hardware=selene androidboot.bootdevice=mtk-msdc.0 bootopt=64S3,32N2,64N2 console=tty0 androidboot.selinux=permissive buildvariant=userdebug printk.devkmsg=on" \
            --kernel_offset 0x00008000 \
            --ramdisk_offset 0x07c80000 \
            --tags_offset 0x0bc80000 \
            --header_version 2 \
            --output "$OUTPUT"
          ls -la "$OUTPUT"

      - name: Free disk before systemimage
        working-directory: halium
        run: |
          rm -f /tmp/vendor_a.img 2>/dev/null || true
          rm -f /tmp/vendor_mnt 2>/dev/null || true
          rm -rf vendor/halium/halium-boot 2>/dev/null || true
          rm -rf out/target/product/${{ env.DEVICE }}/obj/ROOT/halium-boot_intermediates 2>/dev/null || true
          rm -rf out/target/product/${{ env.DEVICE }}/obj/EMBEDDED_INITRAMFS 2>/dev/null || true
          ccache --show-stats
          df -h

      - name: Build system image
        working-directory: halium
        run: |
          df -h
          source build/envsetup.sh
          lunch ${{ env.LUNCH_COMBO }}
          export USE_CCACHE=1
          export CCACHE_DIR=~/.ccache
          export USE_HOST_LEX=yes
          mka systemimage -j$(nproc --all) 2>&1 | tee /tmp/build-system.log; exit ${PIPESTATUS[0]}

      - name: Collect output
        working-directory: halium
        run: |
          mkdir -p ../out
          cp out/target/product/${{ env.DEVICE }}/halium-boot.img ../out/ 2>/dev/null || true
          cp out/target/product/${{ env.DEVICE }}/system.img ../out/ 2>/dev/null || true
          ls -la ../out/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: halium-${{ env.DEVICE }}-${{ github.run_number }}
          path: out/
          retention-days: 30

      - name: Create release
        if: success()
        shell: bash
        working-directory: halium
        run: |
          for i in 1 2 3 4 5; do
            echo "Attempt $i to create release..."
            gh release create "successful.release.selene.halium11.${{ github.run_number }}" \
              --repo ${{ github.repository }} \
              --title "Halium 11 ${{ env.DEVICE }} #${{ github.run_number }}" \
              --target "${{ github.sha }}" \
              ../out/* \
              --latest && echo "Release created!" && exit 0
            echo "Attempt $i failed, waiting 30s..."
            sleep 30
          done
          echo "All release attempts failed"
          exit 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Telegram on success
        if: success()
        shell: bash
        run: |
          esc() { sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g'; }
          CHAT="${{ secrets.TELEGRAM_CHAT_ID }}"
          BOT="${{ secrets.TELEGRAM_BOT_TOKEN }}"
          RUN="${{ github.run_number }}"
          RUN_ID="${{ github.run_id }}"
          REPO="${{ github.repository }}"
          ACTOR="${{ github.actor }}"
          REF="${{ github.ref_name }}"
          SHA_SHORT=$(git rev-parse --short HEAD 2>/dev/null || echo "N/A")
          COMMIT_MSG=$(git log -1 --format=%s 2>/dev/null | esc || echo "N/A")
          printf -v MSG '%s\n' \
            "✅ <b>Halium 11 Build for Selene #$RUN SUCCEEDED</b>" \
            "" \
            "<b>Device:</b> Xiaomi Redmi 10 2022 (selene)" \
            "<b>SoC:</b> MediaTek MT6768 (Helio G88)" \
            "<b>Halium version:</b> 11.0 (Android 11/R)" \
            "<b>Kernel:</b> prebuilt Image.gz-dtb (from semirelease)" \
            "<b>Vendor:</b> curated proprietary-files.txt (~600 blobs)" \
            "" \
            "<b>Release tag:</b> successful.release.selene.halium11.$RUN" \
            "" \
            "<b>Commit:</b> <code>$SHA_SHORT</code> $COMMIT_MSG" \
            "<b>Triggered by:</b> $ACTOR on $REF" \
            "" \
            "<a href=\"https://github.com/$REPO/actions/runs/$RUN_ID\">View run</a>"
          jq -n --arg chat_id "$CHAT" --arg text "$MSG" \
            '{chat_id: $chat_id, text: $text, parse_mode: "HTML", disable_web_page_preview: true}' \
            > /tmp/tg.json
          curl -s -X POST "https://api.telegram.org/bot$BOT/sendMessage" \
            -H "Content-Type: application/json" -d @/tmp/tg.json

      - name: Notify Telegram on failure
        if: failure()
        shell: bash
        run: |
          esc() { sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g'; }
          CHAT="${{ secrets.TELEGRAM_CHAT_ID }}"
          BOT="${{ secrets.TELEGRAM_BOT_TOKEN }}"
          RUN="${{ github.run_number }}"
          RUN_ID="${{ github.run_id }}"
          REPO="${{ github.repository }}"
          ACTOR="${{ github.actor }}"
          REF="${{ github.ref_name }}"
          SHA_SHORT=$(git rev-parse --short HEAD 2>/dev/null || echo "N/A")
          COMMIT_MSG=$(git log -1 --format=%s 2>/dev/null | esc || echo "N/A")

          # Extract error from build log
          ERRORS=""
          for LOGFILE in /tmp/build-system.log /tmp/build-boot.log; do
            if [ -f "$LOGFILE" ]; then
              FOUND=$(grep -E "FAILED:|error:" "$LOGFILE" 2>/dev/null | tail -10 | esc)
              if [ -n "$FOUND" ]; then
                ERRORS="$FOUND"
                break
              fi
            fi
          done
          if [ -z "$ERRORS" ]; then
            ERRORS="Check the run log for details."
          fi

          printf -v MSG '%s\n' \
            "❌ <b>Halium 11 Build #$RUN FAILED</b>" \
            "" \
            "<b>Commit:</b> <code>$SHA_SHORT</code> $COMMIT_MSG" \
            "" \
            "<b>Error:</b>" \
            "<code>$ERRORS</code>" \
            "" \
            "<a href=\"https://github.com/$REPO/actions/runs/$RUN_ID\">View run</a>"
          jq -n --arg chat_id "$CHAT" --arg text "$MSG" \
            '{chat_id: $chat_id, text: $text, parse_mode: "HTML", disable_web_page_preview: true}' \
            > /tmp/tg.json
          curl -s -X POST "https://api.telegram.org/bot$BOT/sendMessage" \
            -H "Content-Type: application/json" -d @/tmp/tg.json
