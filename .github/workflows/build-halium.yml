name: Build Halium 11 for Selene (Redmi 10 2022)

on:
  workflow_dispatch:
  push:
    branches:
      - halium-selene
    paths:
      - 'dts/**'
      - 'vendor/**'
      - 'scripts/**'
      - '.github/workflows/build-halium.yml'

env:
  DEVICE: selene
  CODENAME: selene
  VENDOR: xiaomi
  LUNCH_COMBO: halium_selene-userdebug
  HALIUM_VERSION: halium-11.0

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          df -h

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc bison build-essential ccache curl flex \
            git-core gnupg gperf imagemagick lib32ncurses5-dev \
            lib32readline-dev lib32z1-dev liblz4-tool libncurses5 \
            libncurses5-dev libpcre3-dev libsdl1.2-dev libssl-dev \
            libxml2 libxml2-utils lzop pngcrush rsync schedtool \
            squashfs-tools xsltproc zip zlib1g-dev \
            python3 python-is-python3 repo cpio openjdk-11-jdk

      - name: Configure ccache
        run: |
          ccache -M 10G
          echo "CCACHE_DIR=~/.ccache" >> $GITHUB_ENV

      - name: Configure git identity
        run: |
          git config --global user.email "ci@halium.build"
          git config --global user.name "Halium CI"

      - name: Add swap
        run: |
          sudo swapon --show
          if ! swapon --show | grep -q /swapfile; then
            sudo dd if=/dev/zero of=/swapfile bs=1M count=8192 status=progress
            sudo chmod 600 /swapfile
            sudo mkswap /swapfile
            sudo swapon /swapfile
          fi
          free -h

      - name: Initialize Halium source tree
        run: |
          mkdir -p halium && cd halium
          repo init -u https://github.com/Halium/android -b ${{ env.HALIUM_VERSION }} --depth=1
          repo sync -c -j$(nproc --all) --no-tags --force-sync

      - name: Place device tree
        working-directory: halium
        run: |
          mkdir -p device/${{ env.VENDOR }}/${{ env.DEVICE }}
          cp -r ${{ github.workspace }}/dts/* device/${{ env.VENDOR }}/${{ env.DEVICE }}/

          mkdir -p vendor/${{ env.VENDOR }}/${{ env.DEVICE }}
          cp ${{ github.workspace }}/vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/proprietary-files.txt \
            vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/ 2>/dev/null || true
          cp ${{ github.workspace }}/vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/selene-vendor.mk \
            vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/ 2>/dev/null || true
          cp ${{ github.workspace }}/vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/BoardConfigVendor.mk \
            vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/ 2>/dev/null || true

          echo "Device tree placed:"
          ls device/${{ env.VENDOR }}/${{ env.DEVICE }}/

      - name: Extract vendor blobs (filtered by proprietary-files.txt)
        working-directory: halium
        run: |
          echo "Downloading vendor_a.img from release..."
          gh release download vendor-blobs-selene \
            --pattern "vendor_a.img" \
            --dir /tmp/ 2>&1
          ls -lh /tmp/vendor_a.img

          sudo mkdir -p /tmp/vendor_mnt
          sudo mount -o ro,loop /tmp/vendor_a.img /tmp/vendor_mnt

          PROP_LIST="vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/proprietary-files.txt"
          DEST="vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/proprietary"
          mkdir -p "$DEST"

          # Copy only files listed in proprietary-files.txt
          COPIED=0
          MISSING=0
          while IFS= read -r line; do
            # Skip comments, empty lines, system files (-), hash suffixes
            [[ -z "$line" || "$line" =~ ^# || "$line" =~ ^- ]] && continue
            src_path="${line%%|*}"
            
            # Skip VINTF and APK files
            [[ "$src_path" == *"/vintf/"* || "$src_path" == *".apk" || "$src_path" == *".jar" ]] && continue
            
            src_full="/tmp/vendor_mnt/$src_path"
            dst_full="$DEST/$src_path"
            
            if [ -f "$src_full" ]; then
              mkdir -p "$(dirname "$dst_full")"
              cp "$src_full" "$dst_full"
              COPIED=$((COPIED + 1))
            else
              echo "MISSING: $src_path"
              MISSING=$((MISSING + 1))
            fi
          done < "$PROP_LIST"

          sudo umount /tmp/vendor_mnt
          rm /tmp/vendor_a.img

          sudo chown -R $(id -u):$(id -g) "$DEST/"
          sudo chmod -R u+rwx "$DEST/"
          rm -rf "$DEST/lost+found"

          echo "Blobs extracted: $COPIED copied, $MISSING missing"
          du -sh "$DEST/"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Filter proprietary-files.txt to only existing blobs
        working-directory: halium
        run: |
          PROP="vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/proprietary-files.txt"
          DEST="vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/proprietary"
          FILTERED=$(mktemp)
          KEPT=0; REMOVED=0
          while IFS= read -r line; do
            [[ -z "$line" || "$line" == \#* ]] && echo "$line" >> "$FILTERED" && continue
            [[ "$line" == -* ]] && echo "$line" >> "$FILTERED" && continue
            src="${line%%|*}"
            if [ -f "$DEST/$src" ]; then
              echo "$line" >> "$FILTERED"
              KEPT=$((KEPT + 1))
            else
              REMOVED=$((REMOVED + 1))
            fi
          done < "$PROP"
          cp "$FILTERED" "$PROP"
          rm "$FILTERED"
          echo "Filtered: $KEPT kept, $REMOVED removed (not in firmware)"

      - name: Generate vendor makefile from proprietary-files.txt
        working-directory: halium
        run: |
          python3 ${{ github.workspace }}/scripts/generate_vendor_mk.py \
            vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/proprietary-files.txt \
            vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/selene-vendor-files.mk

      - name: Download prebuilt kernel from latest release
        working-directory: halium
        run: |
          TAG=$(gh release list --limit=50 --json tagName,name -q '.[] | select(.tagName | test("successful\\.semirelease\\.selene")) | .tagName' 2>/dev/null | head -1)
          if [ -z "$TAG" ]; then
            echo "ERROR: No successful kernel release found. Run the kernel build first."
            exit 1
          fi
          echo "Found release: $TAG"
          mkdir -p device/${{ env.VENDOR }}/${{ env.DEVICE }}/prebuilt
          gh release download "$TAG" --pattern "Image.gz-dtb" \
            --dir device/${{ env.VENDOR }}/${{ env.DEVICE }}/prebuilt/ 2>&1
          ls -la device/${{ env.VENDOR }}/${{ env.DEVICE }}/prebuilt/
          echo "Prebuilt kernel ready"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clone MTK sepolicy
        working-directory: halium
        run: |
          git clone --depth=1 -b eleven \
            https://github.com/PixelExperience/device_mediatek_sepolicy_vndr.git \
            device/mediatek/sepolicy_vndr 2>/dev/null || true

      - name: Apply Hybris patches
        working-directory: halium
        run: |
          ./hybris-patches/apply-patches.sh --mb

      - name: Patch import-namespace to avoid cycle errors
        working-directory: halium
        run: |
          python3 << 'PYEOF'
          import re
          path = 'build/core/node_fns.mk'
          try:
              with open(path, 'r') as f:
                  content = f.read()
              content = re.sub(r'\$\(error import of "\$\(2\)" failed\)', '', content)
              with open(path, 'w') as f:
                  f.write(content)
              print('Removed error import line from node_fns.mk')
          except FileNotFoundError:
              print(f'{path} not found')
          PYEOF

      - name: Fix Soong Make variables
        working-directory: halium
        run: |
          SOONG_BP="vendor/lineage/build/soong/Android.bp"
          if [ -f "$SOONG_BP" ]; then
            python3 << 'PYEOF'
          import re
          path = 'vendor/lineage/build/soong/Android.bp'
          with open(path) as f:
              c = f.read()
          c2 = re.sub(r'\$\([A-Z_]+\)', '', c)
          if c2 != c:
              print('Cleaned Make vars from Soong Android.bp')
          with open(path, 'w') as f:
              f.write(c2)
          print('Done')
          PYEOF
          else
            echo "$SOONG_BP not found, skipping"
          fi

      - name: Clone and patch halium-boot repo
        working-directory: halium
        run: |
          git clone --depth=1 https://github.com/Halium/halium-boot.git vendor/halium/halium-boot
          echo "halium-boot cloned"

      - name: Allow disallowed build tools (mkbootimg)
        working-directory: halium
        run: |
          CONFIG="build/soong/ui/build/paths/config.go"
          if [ -f "$CONFIG" ]; then
            grep -n "mkbootimg" "$CONFIG" && echo "mkbootimg already allowed" && exit 0
            # Find the allowed tools list and add mkbootimg
            python3 << 'PYEOF'
          path = 'build/soong/ui/build/paths/config.go'
          with open(path) as f:
              lines = f.readlines()
          new_lines = []
          added = False
          for line in lines:
              new_lines.append(line)
              if not added and '"mke2fs"' in line:
                  # Add mkbootimg right after mke2fs (alphabetical order)
                  indent = line[:len(line) - len(line.lstrip())]
                  new_lines.append(indent + '"mkbootimg",\n')
                  added = True
                  print('Added mkbootimg to allowed tools after mke2fs')
          if not added:
              # Fallback: find any tool entry and add after it
              for i, line in enumerate(lines):
                  if '""' in line and 'Tool' not in line:
                      indent = line[:len(line) - len(line.lstrip())]
                      new_lines.insert(i + 1, indent + '"mkbootimg",\n')
                      added = True
                      print(f'Added mkbootimg at line {i+1}')
                      break
          with open(path, 'w') as f:
              f.writelines(new_lines)
          if not added:
              print('WARNING: Could not find insertion point for mkbootimg')
          PYEOF
          else
            echo "PATHS config not found, patching Android.mk instead"
            sed -i 's|@mkbootimg|$(HOST_OUT)/bin/mkbootimg|g' vendor/halium/halium-boot/Android.mk
          fi

      - name: Remove broken platform_testing test files
        working-directory: halium
        run: |
          rm -f platform_testing/build/tasks/tests/instrumentation_test_list.mk
          rm -f platform_testing/build/tasks/continuous_instrumentation_tests.mk
          rm -f platform_testing/build/tasks/continuous_native_tests.mk
          echo "Removed broken test task files"

      - name: Setup build environment
        working-directory: halium
        run: |
          source build/envsetup.sh
          lunch ${{ env.LUNCH_COMBO }}

      - name: Download initramfs and patch halium-boot
        working-directory: halium
        run: |
          INITRD_URL="https://github.com/halium/initramfs-tools-halium/releases/download/continuous/initrd.img-touch-arm64"
          INITRD_CACHE="vendor/halium/halium-boot/initrd-cache.img"
          mkdir -p "$(dirname "$INITRD_CACHE")"
          curl --location "$INITRD_URL" --output "$INITRD_CACHE" --silent
          ls -lh "$INITRD_CACHE"
          printf '#!/bin/bash\nARCH=$1\nTARGET=$2\ncp "$(dirname "$0")/initrd-cache.img" "$TARGET"\necho "Using cached initramfs"\n' \
            > vendor/halium/halium-boot/get-initrd.sh
          chmod +x vendor/halium/halium-boot/get-initrd.sh

      - name: Build halium-boot
        working-directory: halium
        run: |
          source build/envsetup.sh
          lunch ${{ env.LUNCH_COMBO }}
          export USE_CCACHE=1
          export CCACHE_DIR=~/.ccache
          export USE_HOST_LEX=yes
          mka mkbootimg
          mka halium-boot -j$(nproc --all)

      - name: Build system image
        working-directory: halium
        run: |
          source build/envsetup.sh
          lunch ${{ env.LUNCH_COMBO }}
          export USE_CCACHE=1
          export CCACHE_DIR=~/.ccache
          export USE_HOST_LEX=yes
          mka systemimage -j$(nproc --all)

      - name: Collect output
        working-directory: halium
        run: |
          mkdir -p ../out
          cp out/target/product/${{ env.DEVICE }}/halium-boot.img ../out/ 2>/dev/null || true
          cp out/target/product/${{ env.DEVICE }}/system.img ../out/ 2>/dev/null || true
          ls -la ../out/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: halium-${{ env.DEVICE }}-${{ github.run_number }}
          path: out/
          retention-days: 30

      - name: Create release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          name: "Halium 11 ${{ env.DEVICE }} #${{ github.run_number }}"
          tag_name: "successful.release.selene.halium11.${{ github.run_number }}"
          files: out/*
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Telegram on success
        if: success()
        shell: bash
        run: |
          esc() { sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g'; }
          CHAT="${{ secrets.TELEGRAM_CHAT_ID }}"
          BOT="${{ secrets.TELEGRAM_BOT_TOKEN }}"
          RUN="${{ github.run_number }}"
          RUN_ID="${{ github.run_id }}"
          REPO="${{ github.repository }}"
          ACTOR="${{ github.actor }}"
          REF="${{ github.ref_name }}"
          SHA_SHORT=$(git rev-parse --short HEAD 2>/dev/null || echo "N/A")
          COMMIT_MSG=$(git log -1 --format=%s 2>/dev/null | esc || echo "N/A")
          printf -v MSG '%s\n' \
            "✅ <b>Halium 11 Build for Selene #$RUN SUCCEEDED</b>" \
            "" \
            "<b>Device:</b> Xiaomi Redmi 10 2022 (selene)" \
            "<b>SoC:</b> MediaTek MT6768 (Helio G88)" \
            "<b>Halium version:</b> 11.0 (Android 11/R)" \
            "<b>Kernel:</b> prebuilt Image.gz-dtb (from semirelease)" \
            "<b>Vendor:</b> curated proprietary-files.txt (~600 blobs)" \
            "" \
            "<b>Release tag:</b> successful.release.selene.halium11.$RUN" \
            "" \
            "<b>Commit:</b> <code>$SHA_SHORT</code> $COMMIT_MSG" \
            "<b>Triggered by:</b> $ACTOR on $REF" \
            "" \
            "<a href=\"https://github.com/$REPO/actions/runs/$RUN_ID\">View run</a>"
          jq -n --arg chat_id "$CHAT" --arg text "$MSG" \
            '{chat_id: $chat_id, text: $text, parse_mode: "HTML", disable_web_page_preview: true}' \
            > /tmp/tg.json
          curl -s -X POST "https://api.telegram.org/bot$BOT/sendMessage" \
            -H "Content-Type: application/json" -d @/tmp/tg.json

      - name: Notify Telegram on failure
        if: failure()
        shell: bash
        run: |
          esc() { sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g'; }
          CHAT="${{ secrets.TELEGRAM_CHAT_ID }}"
          BOT="${{ secrets.TELEGRAM_BOT_TOKEN }}"
          RUN="${{ github.run_number }}"
          RUN_ID="${{ github.run_id }}"
          REPO="${{ github.repository }}"
          ACTOR="${{ github.actor }}"
          REF="${{ github.ref_name }}"
          SHA_SHORT=$(git rev-parse --short HEAD 2>/dev/null || echo "N/A")
          COMMIT_MSG=$(git log -1 --format=%s 2>/dev/null | esc || echo "N/A")
          printf -v MSG '%s\n' \
            "❌ <b>Halium 11 Build for Selene #$RUN FAILED</b>" \
            "" \
            "<b>Device:</b> Xiaomi Redmi 10 2022 (selene)" \
            "<b>Commit:</b> <code>$SHA_SHORT</code> $COMMIT_MSG" \
            "<b>Triggered by:</b> $ACTOR on $REF" \
            "" \
            "<a href=\"https://github.com/$REPO/actions/runs/$RUN_ID\">View run</a>"
          jq -n --arg chat_id "$CHAT" --arg text "$MSG" \
            '{chat_id: $chat_id, text: $text, parse_mode: "HTML", disable_web_page_preview: true}' \
            > /tmp/tg.json
          curl -s -X POST "https://api.telegram.org/bot$BOT/sendMessage" \
            -H "Content-Type: application/json" -d @/tmp/tg.json
