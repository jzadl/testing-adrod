name: Build Halium for J7 Neo

on:
  workflow_dispatch:
  push:
    branches:
      - halium-j7velte
    paths:
      - 'device/**'

env:
  DEVICE: j7velte
  CODENAME: j7velte
  VENDOR: samsung
  LUNCH_COMBO: halium_j7velte-userdebug
  KERNEL_MAKE_FLAGS: PLATFORM_VERSION=9.0.0 ANDROID_MAJOR_VERSION=p

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          df -h

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc bison build-essential ccache curl flex \
            git-core gnupg gperf imagemagick lib32ncurses5-dev \
            lib32readline-dev lib32z1-dev liblz4-tool libncurses5 \
            libncurses5-dev libpcre3-dev libsdl1.2-dev libssl-dev \
            libxml2 libxml2-utils lzop pngcrush rsync schedtool \
            squashfs-tools xsltproc zip zlib1g-dev openjdk-17-jdk \
            python3 python-is-python3 repo cpio

      - name: Configure ccache
        run: |
          ccache -M 10G
          echo "CCACHE_DIR=~/.ccache" >> $GITHUB_ENV

      - name: Configure git identity
        run: |
          git config --global user.email "ci@halium.build"
          git config --global user.name "Halium CI"

      - name: Initialize Halium source tree
        run: |
          mkdir -p halium && cd halium
          repo init -u https://github.com/Halium/android -b halium-9.0 --depth=1
          repo sync -c -j$(nproc --all) --no-tags --force-sync

      - name: Clone device tree
        working-directory: halium
        run: |
          mkdir -p device/${{ env.VENDOR }}/${{ env.DEVICE }}
          cp -r ${{ github.workspace }}/device/${{ env.VENDOR }}/${{ env.DEVICE }}/* \
            device/${{ env.VENDOR }}/${{ env.DEVICE }}/

      - name: Clone kernel source
        working-directory: halium
        run: |
          git clone --depth=1 -b halium-9.0 \
            https://github.com/halium-exynos/android_kernel_samsung_exynos7870.git \
            kernel/samsung/exynos7870

      - name: Clone hardware repos
        working-directory: halium
        run: |
          git clone --depth=1 -b lineage-18.1 \
            https://github.com/samsungexynos7870/android_hardware_samsung_slsi-linaro_exynos7870.git \
            hardware/samsung_slsi-linaro/exynos7870 2>/dev/null || true

      - name: Fix kernel ANDROID_VERSION
        working-directory: halium/kernel/samsung/exynos7870
        run: |
          sed -i 's/YYLTYPE yylloc;/YYLTYPE yylloc;\nYYLTYPE yyerror_yylloc;/' scripts/dtc/dtc-lexer.l 2>/dev/null || true

      - name: Apply Hybris patches
        working-directory: halium
        run: |
          ./hybris-patches/apply-patches.sh --mb

      - name: Patch import-namespace to avoid cycle errors
        working-directory: halium
        run: |
          python3 << 'PYEOF'
          import re
          path = 'build/core/node_fns.mk'
          try:
              with open(path, 'r') as f:
                  content = f.read()
              # Remove only the error line, keep the warning
              content = re.sub(r'\$\(error import of "\$\(2\)" failed\)', '', content)
              with open(path, 'w') as f:
                  f.write(content)
              print('Removed error import line from node_fns.mk')
          except FileNotFoundError:
              print(f'{path} not found')
          PYEOF

      - name: Setup build environment
        working-directory: halium
        run: |
          source build/envsetup.sh
          lunch ${{ env.LUNCH_COMBO }}

      - name: Build halium-boot
        working-directory: halium
        run: |
          source build/envsetup.sh
          lunch ${{ env.LUNCH_COMBO }}
          export USE_CCACHE=1
          export CCACHE_DIR=~/.ccache
          make halium-boot -j$(nproc --all)

      - name: Build system image
        working-directory: halium
        run: |
          source build/envsetup.sh
          lunch ${{ env.LUNCH_COMBO }}
          export USE_CCACHE=1
          export CCACHE_DIR=~/.ccache
          mka systemimage -j$(nproc --all)

      - name: Collect output
        working-directory: halium
        run: |
          mkdir -p ../out
          cp out/target/product/${{ env.DEVICE }}/halium-boot.img ../out/ 2>/dev/null || true
          cp out/target/product/${{ env.DEVICE }}/system.img ../out/ 2>/dev/null || true
          cp out/target/product/${{ env.DEVICE }}/dt.img ../out/ 2>/dev/null || true
          ls -la ../out/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: halium-${{ env.DEVICE }}-${{ github.run_number }}
          path: out/
          retention-days: 30

      - name: Create release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          name: "Halium ${{ env.DEVICE }} #${{ github.run_number }}"
          tag_name: "successful.release.${{ github.run_number }}"
          files: out/*
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Telegram on success
        if: success()
        shell: bash
        run: |
          esc() { sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g'; }
          CHAT="${{ secrets.TELEGRAM_CHAT_ID }}"
          BOT="${{ secrets.TELEGRAM_BOT_TOKEN }}"
          RUN="${{ github.run_number }}"
          RUN_ID="${{ github.run_id }}"
          REPO="${{ github.repository }}"
          ACTOR="${{ github.actor }}"
          REF="${{ github.ref_name }}"
          SHA_SHORT=$(git rev-parse --short HEAD 2>/dev/null || echo "N/A")
          COMMIT_MSG=$(git log -1 --format=%s 2>/dev/null | esc || echo "N/A")
          printf -v MSG '%s\n' \
            "✅ <b>Halium 9 Build for J7 Neo #$RUN SUCCEEDED</b>" \
            "" \
            "<b>Device:</b> Samsung Galaxy J7 Neo (j7velte)" \
            "<b>SoC:</b> Exynos 7870" \
            "<b>Halium version:</b> 9.0 (Android 9/Pie)" \
            "<b>Kernel:</b> halium-exynos/android_kernel_samsung_exynos7870@halium-9.0" \
            "" \
            "<b>Release tag:</b> successful.release.$RUN" \
            "<b>Artifact:</b> halium-j7velte-$RUN" \
            "" \
            "<b>Repo commit:</b> <code>$SHA_SHORT</code>" \
            "<b>Commit msg:</b> $COMMIT_MSG" \
            "<b>Triggered by:</b> $ACTOR" \
            "<b>Branch:</b> $REF" \
            "" \
            "<a href=\"https://github.com/$REPO/actions/runs/$RUN_ID\">🔗 View run on GitHub</a>"
          jq -n --arg chat_id "$CHAT" --arg text "$MSG" \
            '{chat_id: $chat_id, text: $text, parse_mode: "HTML", disable_web_page_preview: true}' \
            > /tmp/tg.json
          curl -s -X POST "https://api.telegram.org/bot$BOT/sendMessage" \
            -H "Content-Type: application/json" -d @/tmp/tg.json

      - name: Notify Telegram on failure
        if: failure()
        shell: bash
        run: |
          esc() { sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g'; }
          CHAT="${{ secrets.TELEGRAM_CHAT_ID }}"
          BOT="${{ secrets.TELEGRAM_BOT_TOKEN }}"
          RUN="${{ github.run_number }}"
          RUN_ID="${{ github.run_id }}"
          REPO="${{ github.repository }}"
          ACTOR="${{ github.actor }}"
          REF="${{ github.ref_name }}"
          SHA_SHORT=$(git rev-parse --short HEAD 2>/dev/null || echo "N/A")
          COMMIT_MSG=$(git log -1 --format=%s 2>/dev/null | esc || echo "N/A")
          printf -v MSG '%s\n' \
            "❌ <b>Halium 9 Build for J7 Neo #$RUN FAILED</b>" \
            "" \
            "<b>Device:</b> Samsung Galaxy J7 Neo (j7velte)" \
            "<b>SoC:</b> Exynos 7870" \
            "<b>Halium version:</b> 9.0 (Android 9/Pie)" \
            "" \
            "<b>Repo commit:</b> <code>$SHA_SHORT</code>" \
            "<b>Commit msg:</b> $COMMIT_MSG" \
            "<b>Triggered by:</b> $ACTOR" \
            "<b>Branch:</b> $REF" \
            "" \
            "<a href=\"https://github.com/$REPO/actions/runs/$RUN_ID\">🔗 View run on GitHub</a>"
          jq -n --arg chat_id "$CHAT" --arg text "$MSG" \
            '{chat_id: $chat_id, text: $text, parse_mode: "HTML", disable_web_page_preview: true}' \
            > /tmp/tg.json
          curl -s -X POST "https://api.telegram.org/bot$BOT/sendMessage" \
            -H "Content-Type: application/json" -d @/tmp/tg.json

