name: GLUE-SYSIMAGE

on:
  workflow_dispatch:
  push:
    branches:
      - halium-selene
    paths:
      - 'dts/**'
      - 'vendor/**'
      - 'scripts/**'
      - '.github/workflows/GLUE-SYSIMAGE.yml'

env:
  DEVICE: selene
  VENDOR: xiaomi
  LUNCH_COMBO: halium_selene-userdebug
  HALIUM_VERSION: halium-11.0
  PROJECTFOLDER: /crave-devspaces/Lineage18
  PROJECTID: "85"

permissions:
  contents: write

jobs:
  build-halium-boot:
    name: Build halium-boot on GitHub Actions
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache \
            /usr/local/.ghcup /usr/share/swift /usr/local/share/powershell \
            /usr/local/share/chromium /usr/share/miniconda /usr/local/share/boost \
            /usr/share/az_* /opt/az 2>/dev/null || true
          sudo apt-get clean

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex git-core gnupg gperf \
            imagemagick lib32ncurses5-dev lib32readline-dev lib32z1-dev liblz4-tool libncurses5 \
            libncurses5-dev libpcre3-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop \
            pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3 python-is-python3 \
            repo cpio openjdk-11-jdk patchelf

      - name: Configure ccache
        run: ccache -M 5G

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-selene-${{ github.run_number }}
          restore-keys: ccache-selene-

      - name: Configure git identity
        run: |
          git config --global user.email "ci@halium.build"
          git config --global user.name "Halium CI"

      - name: Initialize Halium source tree
        run: |
          mkdir -p halium && cd halium
          repo init -u https://github.com/Halium/android -b ${{ env.HALIUM_VERSION }} --depth=1
          repo sync -c -j$(nproc --all) --no-tags --force-sync

      - name: Place device tree
        working-directory: halium
        run: |
          mkdir -p device/${{ env.VENDOR }}/${{ env.DEVICE }}
          cp -r ${{ github.workspace }}/dts/* device/${{ env.VENDOR }}/${{ env.DEVICE }}/
          mkdir -p vendor/${{ env.VENDOR }}/${{ env.DEVICE }}
          cp ${{ github.workspace }}/vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/proprietary-files.txt \
            vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/ 2>/dev/null || true
          cp ${{ github.workspace }}/vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/selene-vendor.mk \
            vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/ 2>/dev/null || true
          cp ${{ github.workspace }}/vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/BoardConfigVendor.mk \
            vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/ 2>/dev/null || true

      - name: Extract vendor blobs
        working-directory: halium
        run: |
          gh release download vendor-blobs-selene --pattern "vendor_a.img" --dir /tmp/ 2>&1
          sudo mkdir -p /tmp/vendor_mnt
          sudo mount -o ro,loop /tmp/vendor_a.img /tmp/vendor_mnt
          PROP_LIST="vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/proprietary-files.txt"
          DEST="vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/proprietary"
          mkdir -p "$DEST"
          while IFS= read -r line; do
            [[ -z "$line" || "$line" =~ ^# || "$line" =~ ^- ]] && continue
            src_path="${line%%|*}"
            [[ "$src_path" == *"/vintf/"* || "$src_path" == *".apk" || "$src_path" == *".jar" ]] && continue
            src_full="/tmp/vendor_mnt/$src_path"
            dst_full="$DEST/$src_path"
            if [ -f "$src_full" ]; then
              mkdir -p "$(dirname "$dst_full")"
              cp "$src_full" "$dst_full"
            fi
          done < "$PROP_LIST"
          sudo umount /tmp/vendor_mnt
          rm -f /tmp/vendor_a.img
          sudo chown -R $(id -u):$(id -g) "$DEST/"
          sudo chmod -R u+rwx "$DEST/"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Patch vendor blobs
        working-directory: halium
        run: |
          DEST="vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/proprietary"
          bash ${{ github.workspace }}/scripts/patch-vendor-blobs.sh "$DEST"
          for lib in libshim_audio.so libshim_beanpod.so libshim_showlogo.so libshim_vtservice.so; do
            if [ -d "$DEST/vendor/lib64" ]; then
              find "$DEST" -name "$lib" -exec cp {} "$DEST/vendor/lib64/" \; 2>/dev/null || true
            fi
          done
          for arch in lib lib64; do
            for lib in utils ui; do
              SHIM_NAME="lib${lib}-v32.so"
              REAL_LIB=""
              for p in "$DEST/vendor/$arch" "$DEST/$arch" "$DEST/system/$arch"; do
                if [ -f "$p/lib${lib}.so" ]; then REAL_LIB="$p/lib${lib}.so"; break; fi
              done
              if [ -n "$REAL_LIB" ]; then
                mkdir -p "$DEST/vendor/$arch"
                cp "$REAL_LIB" "$DEST/vendor/$arch/$SHIM_NAME" 2>/dev/null || true
              fi
            done
          done

      - name: Install VINTF manifest
        working-directory: halium
        run: |
          DEST="vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/proprietary"
          mkdir -p "$DEST/etc/vintf/manifest"
          cp ${{ github.workspace }}/dts/manifest.xml "$DEST/etc/vintf/manifest/manifest_${{ env.DEVICE }}.xml"

      - name: Filter proprietary-files.txt
        working-directory: halium
        run: |
          PROP="vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/proprietary-files.txt"
          DEST="vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/proprietary"
          FILTERED=$(mktemp)
          while IFS= read -r line; do
            [[ -z "$line" || "$line" == \#* ]] && echo "$line" >> "$FILTERED" && continue
            [[ "$line" == -* ]] && echo "$line" >> "$FILTERED" && continue
            src="${line%%|*}"
            if [ -f "$DEST/$src" ]; then echo "$line" >> "$FILTERED"; fi
          done < "$PROP"
          cp "$FILTERED" "$PROP"
          rm "$FILTERED"

      - name: Generate vendor makefile
        working-directory: halium
        run: |
          python3 ${{ github.workspace }}/scripts/generate_vendor_mk.py \
            vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/proprietary-files.txt \
            vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/selene-vendor-files.mk

      - name: Download prebuilt kernel
        working-directory: halium
        run: |
          for i in 1 2 3 4 5; do
            TAG=$(gh release list --limit=50 --json tagName,name -q '.[] | select(.tagName | test("successful\\.semirelease\\.selene")) | .tagName' 2>/dev/null | head -1)
            if [ -n "$TAG" ]; then break; fi
            sleep 30
          done
          if [ -z "$TAG" ]; then exit 1; fi
          mkdir -p device/${{ env.VENDOR }}/${{ env.DEVICE }}/prebuilt
          gh release download "$TAG" --pattern "Image.gz-dtb" --dir device/${{ env.VENDOR }}/${{ env.DEVICE }}/prebuilt/
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clone MTK sepolicy
        working-directory: halium
        run: |
          git clone --depth=1 -b eleven \
            https://github.com/PixelExperience/device_mediatek_sepolicy_vndr.git \
            device/mediatek/sepolicy_vndr 2>/dev/null || true

      - name: Apply Hybris patches
        working-directory: halium
        run: ./hybris-patches/apply-patches.sh --mb

      - name: Patch import-namespace
        working-directory: halium
        run: |
          python3 - << 'PYEOF'
          import re
          try:
              with open('build/core/node_fns.mk', 'r') as f: content = f.read()
              content = re.sub(r'\$\(error import of "\$\(2\)" failed\)', '', content)
              with open('build/core/node_fns.mk', 'w') as f: f.write(content)
          except FileNotFoundError: pass
          PYEOF

      - name: Fix Soong Make variables
        working-directory: halium
        run: |
          if [ -f "vendor/lineage/build/soong/Android.bp" ]; then
            python3 - << 'PYEOF'
            import re
            with open('vendor/lineage/build/soong/Android.bp') as f: c = f.read()
            c2 = re.sub(r'\$\([A-Z_]+\)', '', c)
            with open('vendor/lineage/build/soong/Android.bp', 'w') as f: f.write(c2)
            PYEOF
          fi

      - name: Clone halium-boot repo
        working-directory: halium
        run: git clone --depth=1 https://github.com/Halium/halium-boot.git vendor/halium/halium-boot

      - name: Allow mkbootimg
        working-directory: halium
        run: |
          CONFIG="build/soong/ui/build/paths/config.go"
          if [ -f "$CONFIG" ]; then
            grep -c "mkbootimg" "$CONFIG" && exit 0
            sed -i '/"mke2fs"/a\        "mkbootimg",' "$CONFIG" 2>/dev/null || true
          fi

      - name: Remove broken test files
        working-directory: halium
        run: |
          rm -f platform_testing/build/tasks/tests/instrumentation_test_list.mk
          rm -f platform_testing/build/tasks/continuous_instrumentation_tests.mk
          rm -f platform_testing/build/tasks/continuous_native_tests.mk

      - name: Patch bootloader_message
        working-directory: halium
        run: |
          HEADER="bootable/recovery/bootloader_message/include/bootloader_message/bootloader_message.h"
          python3 -c "
          with open('$HEADER', 'r') as f: content = f.read()
          if 'BOARD_RECOVERY_BLDRMSG_OFFSET' in content and '#define BOARD_RECOVERY_BLDRMSG_OFFSET' not in content:
              content = '#ifndef BOARD_RECOVERY_BLDRMSG_OFFSET\n#define BOARD_RECOVERY_BLDRMSG_OFFSET 0x00000000\n#endif\n\n' + content
              with open('$HEADER', 'w') as f: f.write(content)
          "

      - name: Download initramfs
        working-directory: halium
        run: |
          INITRD_CACHE="vendor/halium/halium-boot/initrd-cache.img"
          mkdir -p "$(dirname "$INITRD_CACHE")"
          curl --location "https://github.com/halium/initramfs-tools-halium/releases/download/continuous/initrd.img-touch-arm64" \
            --output "$INITRD_CACHE" --silent
          printf '#!/bin/bash\nARCH=$1\nTARGET=$2\ncp "$(dirname "$0")/initrd-cache.img" "$TARGET"\necho "Using cached initramfs"\n' > vendor/halium/halium-boot/get-initrd.sh
          chmod +x vendor/halium/halium-boot/get-initrd.sh

      - name: Build halium-boot
        working-directory: halium
        run: |
          source build/envsetup.sh
          lunch ${{ env.LUNCH_COMBO }}
          export USE_CCACHE=1 CCACHE_DIR=~/.ccache USE_HOST_LEX=yes
          mka mkbootimg
          mka halium-boot -j$(nproc --all)

      - name: Upload halium-boot artifact
        uses: actions/upload-artifact@v4
        with:
          name: halium-boot-${{ github.run_number }}
          path: halium/out/target/product/${{ env.DEVICE }}/halium-boot.img
          retention-days: 7

  build-systemimage:
    name: Build systemimage on Crave
    runs-on: ubuntu-22.04
    needs: build-halium-boot
    timeout-minutes: 1440
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install repo tool
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          sudo ln -sf ~/bin/repo /usr/bin/repo

      - name: Configure git
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"

      - name: Configure crave CLI
        run: |
          mkdir -p ${HOME}/bin/
          curl -s https://raw.githubusercontent.com/accupara/crave/master/get_crave.sh | bash -s --
          mv ${PWD}/crave ${HOME}/bin/
          sudo ln -sf /home/${USER}/bin/crave /usr/bin/crave
          envsubst < ${PWD}/crave.conf.sample >> ${PWD}/crave.conf
          rm -rf ${PWD}/crave.conf.sample
        env:
          CRAVE_USERNAME: ${{ secrets.CRAVE_USERNAME }}
          CRAVE_TOKEN: ${{ secrets.CRAVE_TOKEN }}

      - name: Create project folder and crave.yaml
        run: |
          mkdir -p ${{ env.PROJECTFOLDER }}/.repo/manifests
          cp configs/crave/crave.yaml.aosp ${{ env.PROJECTFOLDER }}/.repo/manifests/crave.yaml
          cp crave.conf ${{ env.PROJECTFOLDER }}/

      - name: Initialize repo (local, no sync)
        working-directory: ${{ env.PROJECTFOLDER }}
        run: repo init -u https://github.com/accupara/los18.1.git -b lineage-18.1 --depth=1

      - name: Build systemimage via crave run
        working-directory: ${{ env.PROJECTFOLDER }}
        run: |
          crave ${{ secrets.CRAVE_FLAGS }} run --no-patch -- '
            set -ex

            # Re-init to Halium (unsupported ROM on LOS 18.1 base)
            repo init -u https://github.com/Halium/android -b halium-11.0 --depth=1

            # Resync with conflict resolution
            /opt/crave/resync.sh

            # Clone testing-adrod for device tree, vendor, scripts
            git clone --depth=1 -b halium-selene https://github.com/${{ github.repository }}.git /tmp/adrod
            ADROD=/tmp/adrod

            # Place device tree
            mkdir -p device/${{ env.VENDOR }}/${{ env.DEVICE }}
            cp -r $ADROD/dts/* device/${{ env.VENDOR }}/${{ env.DEVICE }}/

            # Place vendor files
            mkdir -p vendor/${{ env.VENDOR }}/${{ env.DEVICE }}
            cp $ADROD/vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/proprietary-files.txt vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/ 2>/dev/null || true
            cp $ADROD/vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/selene-vendor.mk vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/ 2>/dev/null || true
            cp $ADROD/vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/BoardConfigVendor.mk vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/ 2>/dev/null || true

            # Download prebuilt kernel from GitHub releases (public, no auth needed)
            KTAG=$(curl -s https://api.github.com/repos/${{ github.repository }}/releases | python3 -c "import sys,json; rels=json.load(sys.stdin); print([r[\"tag_name\"] for r in rels if \"semirelease\" in r.get(\"tag_name\",\"\")][0])" 2>/dev/null || echo "")
            if [ -z "$KTAG" ]; then echo "No kernel release found"; exit 1; fi
            mkdir -p device/${{ env.VENDOR }}/${{ env.DEVICE }}/prebuilt
            wget -q "https://github.com/${{ github.repository }}/releases/download/${KTAG}/Image.gz-dtb" \
              -O device/${{ env.VENDOR }}/${{ env.DEVICE }}/prebuilt/Image.gz-dtb

            # Download vendor_a.img from GitHub releases
            wget -q "https://github.com/${{ github.repository }}/releases/download/vendor-blobs-selene/vendor_a.img" \
              -O /tmp/vendor_a.img || true

            # Extract vendor blobs
            if [ -f /tmp/vendor_a.img ]; then
              mkdir -p /tmp/vendor_mnt
              sudo mount -o ro,loop /tmp/vendor_a.img /tmp/vendor_mnt
              DEST=vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/proprietary
              mkdir -p $DEST
              while IFS= read -r line; do
                [ -z "$line" ] && continue
                [[ "$line" =~ ^# ]] && continue
                [[ "$line" =~ ^- ]] && continue
                src_path=${line%%|*}
                [[ "$src_path" == */vintf/* || "$src_path" == *.apk || "$src_path" == *.jar ]] && continue
                if [ -f /tmp/vendor_mnt/$src_path ]; then
                  mkdir -p $(dirname $DEST/$src_path)
                  cp /tmp/vendor_mnt/$src_path $DEST/$src_path
                fi
              done < vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/proprietary-files.txt
              sudo umount /tmp/vendor_mnt
              rm -f /tmp/vendor_a.img
            fi

            # Patch vendor blobs
            bash $ADROD/scripts/patch-vendor-blobs.sh vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/proprietary || true
            for lib in libshim_audio.so libshim_beanpod.so libshim_showlogo.so libshim_vtservice.so; do
              if [ -d vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/proprietary/vendor/lib64 ]; then
                find vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/proprietary -name "$lib" -exec cp {} vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/proprietary/vendor/lib64/ \; 2>/dev/null || true
              fi
            done

            # Install VINTF manifest
            mkdir -p vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/proprietary/etc/vintf/manifest
            cp $ADROD/dts/manifest.xml vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/proprietary/etc/vintf/manifest/manifest_${{ env.DEVICE }}.xml

            # Filter proprietary-files.txt
            PROP=vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/proprietary-files.txt
            DEST=vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/proprietary
            FILTERED=$(mktemp)
            while IFS= read -r line; do
              [ -z "$line" ] && echo "$line" >> "$FILTERED" && continue
              [[ "$line" == \#* ]] && echo "$line" >> "$FILTERED" && continue
              [[ "$line" == -* ]] && echo "$line" >> "$FILTERED" && continue
              src=${line%%|*}
              if [ -f "$DEST/$src" ]; then echo "$line" >> "$FILTERED"; fi
            done < "$PROP"
            cp "$FILTERED" "$PROP"
            rm "$FILTERED"

            # Generate vendor makefile
            python3 $ADROD/scripts/generate_vendor_mk.py "$PROP" vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/selene-vendor-files.mk

            # Clone MTK sepolicy
            git clone --depth=1 -b eleven https://github.com/PixelExperience/device_mediatek_sepolicy_vndr.git device/mediatek/sepolicy_vndr 2>/dev/null || true

            # Apply Hybris patches
            ./hybris-patches/apply-patches.sh --mb

            # Patch import-namespace
            python3 -c "
            import re
            try:
                with open(\"build/core/node_fns.mk\",\"r\") as f: c=f.read()
                c=re.sub(r\"\\$\\(error import of \\\"\\$\\(2\\)\\\" failed\\)\",\"\",c)
                with open(\"build/core/node_fns.mk\",\"w\") as f: f.write(c)
            except: pass
            "

            # Fix Soong
            if [ -f vendor/lineage/build/soong/Android.bp ]; then
              python3 -c "
              import re
              with open(\"vendor/lineage/build/soong/Android.bp\") as f: c=f.read()
              c2=re.sub(r\"\\$\\([A-Z_]+\\)\",\"\",c)
              with open(\"vendor/lineage/build/soong/Android.bp\",\"w\") as f: f.write(c2)
              "
            fi

            # Remove broken test files
            rm -f platform_testing/build/tasks/tests/instrumentation_test_list.mk
            rm -f platform_testing/build/tasks/continuous_instrumentation_tests.mk
            rm -f platform_testing/build/tasks/continuous_native_tests.mk

            # Patch bootloader_message
            HEADER=bootable/recovery/bootloader_message/include/bootloader_message/bootloader_message.h
            python3 -c "
            with open(\"$HEADER\",\"r\") as f: c=f.read()
            if \"BOARD_RECOVERY_BLDRMSG_OFFSET\" in c and \"#define BOARD_RECOVERY_BLDRMSG_OFFSET\" not in c:
                c=\"#ifndef BOARD_RECOVERY_BLDRMSG_OFFSET\n#define BOARD_RECOVERY_BLDRMSG_OFFSET 0x00000000\n#endif\n\n\"+c
                with open(\"$HEADER\",\"w\") as f: f.write(c)
            "

            # Build systemimage
            export USE_CCACHE=1 CCACHE_DIR=~/.ccache USE_HOST_LEX=yes
            source build/envsetup.sh
            lunch ${{ env.LUNCH_COMBO }}
            make installclean
            mka systemimage -j$(nproc --all)
          '

      - name: Pull system image from Crave
        working-directory: ${{ env.PROJECTFOLDER }}
        run: |
          crave pull out/target/product/${{ env.DEVICE }}/system.img
          mkdir -p ${{ github.workspace }}/out
          cp out/target/product/${{ env.DEVICE }}/system.img ${{ github.workspace }}/out/

      - name: Upload systemimage artifact
        uses: actions/upload-artifact@v4
        with:
          name: systemimage-${{ github.run_number }}
          path: out/system.img
          retention-days: 7

  release:
    name: Create release
    runs-on: ubuntu-22.04
    needs: build-systemimage
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: out/
          merge-multiple: true

      - name: Create release
        run: |
          TAG="successful.release.selene.halium11.${{ github.run_number }}"
          for i in 1 2 3 4 5; do
            gh release delete "$TAG" --repo ${{ github.repository }} --yes --cleanup-tag 2>/dev/null || true
            sleep 5
            gh release create "$TAG" --repo ${{ github.repository }} \
              --title "Halium 11 ${{ env.DEVICE }} #${{ github.run_number }}" \
              out/* --latest && exit 0
            sleep 30
          done
          exit 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Telegram
        if: always()
        run: |
          CHAT="${{ secrets.TELEGRAM_CHAT_ID }}"
          BOT="${{ secrets.TELEGRAM_BOT_TOKEN }}"
          RUN="${{ github.run_number }}"
          MSG="GLUE-SYSIMAGE #$RUN ${{ job.status }}"
          curl -s -X POST "https://api.telegram.org/bot$BOT/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"$CHAT\",\"text\":\"$MSG\"}"