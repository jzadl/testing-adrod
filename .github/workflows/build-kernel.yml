name: Build Halium Kernel for J7 Neo

on:
  workflow_dispatch:
  push:
    branches:
      - halium-j7velte

env:
  DEVICE: j7velte
  KERNEL_SOURCE: https://github.com/halium-exynos/android_kernel_samsung_exynos7870.git
  KERNEL_BRANCH: halium-9.0

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc bison build-essential flex libssl-dev \
            libelf-dev gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            gcc-arm-linux-gnueabi binutils-arm-linux-gnueabi \
            python3 python-is-python3 git cpio ccache

      - name: Clone kernel source
        run: |
          git clone --depth=1 -b ${{ env.KERNEL_BRANCH }} \
            ${{ env.KERNEL_SOURCE }} kernel

      - name: Fix dtc yylloc
        working-directory: kernel
        run: |
          sed -i 's/YYLTYPE yylloc;/YYLTYPE yylloc;\nYYLTYPE yyerror_yylloc;/' scripts/dtc/dtc-lexer.l

      - name: Build kernel
        working-directory: kernel
        run: |
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          export HOSTCFLAGS="-fcommon"
          export ANDROID_MAJOR_VERSION=p
          export PLATFORM_VERSION=9.0.0

          make ${{ env.DEVICE }}_defconfig
          make -j$(nproc --all) HOSTCFLAGS="-fcommon" PLATFORM_VERSION=9.0.0

          mkdir -p ../out
          cp arch/arm64/boot/Image.gz-dtb ../out/ 2>/dev/null || \
          cp arch/arm64/boot/Image.gz ../out/ 2>/dev/null || \
          cp arch/arm64/boot/Image ../out/

          echo "=== Kernel build complete ==="
          ls -la ../out/

      - name: Upload kernel artifact
        uses: actions/upload-artifact@v4
        with:
          name: halium-kernel-${{ env.DEVICE }}-${{ github.run_number }}
          path: out/
          retention-days: 30

      - name: Create release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          name: "Halium Kernel ${{ env.DEVICE }} #${{ github.run_number }}"
          tag_name: "kernel-${{ env.DEVICE }}-r${{ github.run_number }}"
          files: out/*
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
