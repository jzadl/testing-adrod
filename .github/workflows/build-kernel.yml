name: Build Halium Kernel for J7 Neo

on:
  workflow_dispatch:
  push:
    branches:
      - halium-j7velte

env:
  DEVICE: j7velte
  KERNEL_SOURCE: https://github.com/halium-exynos/android_kernel_samsung_exynos7870.git
  KERNEL_BRANCH: halium-9.0

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc bison build-essential flex libssl-dev \
            libelf-dev gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            gcc-arm-linux-gnueabi binutils-arm-linux-gnueabi \
            python3 python-is-python3 git cpio ccache

      - name: Clone kernel source
        run: |
          git clone --depth=1 -b ${{ env.KERNEL_BRANCH }} \
            ${{ env.KERNEL_SOURCE }} kernel

      - name: Fix dtc yylloc
        working-directory: kernel
        run: |
          sed -i 's/YYLTYPE yylloc;/YYLTYPE yylloc;\nYYLTYPE yyerror_yylloc;/' scripts/dtc/dtc-lexer.l

      - name: Build kernel
        working-directory: kernel
        run: |
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          export HOSTCFLAGS="-fcommon"
          export ANDROID_MAJOR_VERSION=p
          export PLATFORM_VERSION=9.0.0

          make ${{ env.DEVICE }}_defconfig
          make -j$(nproc --all) HOSTCFLAGS="-fcommon" PLATFORM_VERSION=9.0.0

          mkdir -p ../out
          cp arch/arm64/boot/Image.gz-dtb ../out/ 2>/dev/null || \
          cp arch/arm64/boot/Image.gz ../out/ 2>/dev/null || \
          cp arch/arm64/boot/Image ../out/

          echo "=== Kernel build complete ==="
          ls -la ../out/

      - name: Upload kernel artifact
        uses: actions/upload-artifact@v4
        with:
          name: halium-kernel-${{ env.DEVICE }}-${{ github.run_number }}
          path: out/
          retention-days: 30

      - name: Create release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          name: "Halium Kernel ${{ env.DEVICE }} #${{ github.run_number }}"
          tag_name: "successful.semirelease.j7velte.${{ github.run_number }}"
          files: out/*
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Telegram on success
        if: success()
        shell: bash
        run: |
          esc() { sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g'; }
          CHAT="${{ secrets.TELEGRAM_CHAT_ID }}"
          BOT="${{ secrets.TELEGRAM_BOT_TOKEN }}"
          RUN="${{ github.run_number }}"
          RUN_ID="${{ github.run_id }}"
          REPO="${{ github.repository }}"
          ACTOR="${{ github.actor }}"
          REF="${{ github.ref_name }}"
          SHA_SHORT=$(git rev-parse --short HEAD 2>/dev/null || echo "N/A")
          COMMIT_MSG=$(git log -1 --format=%s 2>/dev/null | esc || echo "N/A")
          K_COMMIT=$(cd kernel && git rev-parse --short HEAD 2>/dev/null || echo "N/A")
          K_FULL=$(cd kernel && git rev-parse HEAD 2>/dev/null || echo "N/A")
          IMG=$(ls out/ 2>/dev/null | head -1 || echo "N/A")
          IMG_SIZE=$(du -h "out/$IMG" 2>/dev/null | cut -f1 || echo "N/A")
          IMG_SHA=$(sha256sum "out/$IMG" 2>/dev/null | cut -d' ' -f1 || echo "N/A")
          printf -v MSG '%s\n' \
            "✅ <b>J7 Neo Kernel Build #$RUN SUCCEEDED</b>" \
            "" \
            "<b>Device:</b> Samsung Galaxy J7 Neo (j7velte)" \
            "<b>SoC:</b> Exynos 7870" \
            "<b>Source:</b> halium-exynos/android_kernel_samsung_exynos7870" \
            "<b>Branch:</b> halium-9.0" \
            "<b>Kernel commit:</b> <code>$K_COMMIT</code>" \
            "<b>Full kernel commit:</b> <code>$K_FULL</code>" \
            "<b>Image:</b> <code>$IMG</code> ($IMG_SIZE)" \
            "<b>SHA256:</b> <code>$IMG_SHA</code>" \
            "" \
            "<b>Release tag:</b> successful.semirelease.j7velte.$RUN" \
            "<b>Repo commit:</b> <code>$SHA_SHORT</code>" \
            "<b>Commit msg:</b> $COMMIT_MSG" \
            "<b>Triggered by:</b> $ACTOR" \
            "<b>Branch:</b> $REF" \
            "" \
            "<a href=\"https://github.com/$REPO/actions/runs/$RUN_ID\">🔗 View run on GitHub</a>"
          jq -n --arg chat_id "$CHAT" --arg text "$MSG" \
            '{chat_id: $chat_id, text: $text, parse_mode: "HTML", disable_web_page_preview: true}' \
            > /tmp/tg.json
          curl -s -X POST "https://api.telegram.org/bot$BOT/sendMessage" \
            -H "Content-Type: application/json" -d @/tmp/tg.json

      - name: Notify Telegram on failure
        if: failure()
        shell: bash
        run: |
          esc() { sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g'; }
          CHAT="${{ secrets.TELEGRAM_CHAT_ID }}"
          BOT="${{ secrets.TELEGRAM_BOT_TOKEN }}"
          RUN="${{ github.run_number }}"
          RUN_ID="${{ github.run_id }}"
          REPO="${{ github.repository }}"
          ACTOR="${{ github.actor }}"
          REF="${{ github.ref_name }}"
          SHA_SHORT=$(git rev-parse --short HEAD 2>/dev/null || echo "N/A")
          COMMIT_MSG=$(git log -1 --format=%s 2>/dev/null | esc || echo "N/A")
          K_COMMIT=$(cd kernel && git rev-parse --short HEAD 2>/dev/null || echo "N/A")
          printf -v MSG '%s\n' \
            "❌ <b>J7 Neo Kernel Build #$RUN FAILED</b>" \
            "" \
            "<b>Device:</b> Samsung Galaxy J7 Neo (j7velte)" \
            "<b>SoC:</b> Exynos 7870" \
            "<b>Source:</b> halium-exynos/android_kernel_samsung_exynos7870" \
            "<b>Branch:</b> halium-9.0" \
            "<b>Kernel commit:</b> <code>$K_COMMIT</code>" \
            "" \
            "<b>Repo commit:</b> <code>$SHA_SHORT</code>" \
            "<b>Commit msg:</b> $COMMIT_MSG" \
            "<b>Triggered by:</b> $ACTOR" \
            "<b>Branch:</b> $REF" \
            "" \
            "<a href=\"https://github.com/$REPO/actions/runs/$RUN_ID\">🔗 View run on GitHub</a>"
          jq -n --arg chat_id "$CHAT" --arg text "$MSG" \
            '{chat_id: $chat_id, text: $text, parse_mode: "HTML", disable_web_page_preview: true}' \
            > /tmp/tg.json
          curl -s -X POST "https://api.telegram.org/bot$BOT/sendMessage" \
            -H "Content-Type: application/json" -d @/tmp/tg.json
