name: Build Halium Kernel for Selene (Redmi 10 2022)

on:
  workflow_dispatch:
  push:
    branches:
      - halium-selene

env:
  DEVICE: selene
  KERNEL_SOURCE: https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git
  KERNEL_BRANCH: selene-r-oss

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc bison build-essential flex libssl-dev \
            libelf-dev gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            gcc-arm-linux-gnueabi binutils-arm-linux-gnueabi \
            python3 python-is-python3 git cpio ccache \
            libncurses-dev device-tree-compiler wget

      - name: Install Clang r383902 (AOSP Android 11)
        run: |
          mkdir -p $HOME/clang
          cd $HOME/clang
          wget -q https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/tags/android-11.0.0_r1/clang-r383902.tar.gz
          tar -xf clang-r383902.tar.gz
          echo "$HOME/clang/bin" >> $GITHUB_PATH

      - name: Clone kernel source
        run: |
          git clone --depth=1 -b ${{ env.KERNEL_BRANCH }} \
            ${{ env.KERNEL_SOURCE }} kernel

      - name: Apply kernel patches
        working-directory: kernel
        run: |
          sed -i 's/^obj-$(CONFIG_MACH_MT6768)/#obj-$(CONFIG_MACH_MT6768)/' \
            drivers/devfreq/Makefile

          mkdir -p include/firmware
          echo "// stub" > include/firmware/fw_sample.i

          mkdir -p tools/build
          printf '#!/bin/bash\nexec /usr/bin/cpio "$@"\n' > tools/build/cpio
          chmod +x tools/build/cpio

          sed -i 's|tools/build/cpio|/usr/bin/cpio|g' kernel/gen_kheaders.sh 2>/dev/null || true

      - name: Build kernel
        working-directory: kernel
        run: |
          export ARCH=arm64
          export SUBARCH=arm64
          export CC=clang
          export HOSTCC=clang
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          export LD=ld.lld
          export AR=llvm-ar
          export NM=llvm-nm
          export OBJCOPY=llvm-objcopy
          export OBJDUMP=llvm-objdump
          export STRIP=llvm-strip

          make O=out ${{ env.DEVICE }}_defconfig
          make O=out -j$(nproc --all)

          mkdir -p ../out
          cp out/arch/arm64/boot/Image.gz-dtb ../out/ 2>/dev/null || \
          cp out/arch/arm64/boot/Image.gz ../out/ 2>/dev/null || \
          cp out/arch/arm64/boot/Image ../out/

          echo "=== Kernel build complete ==="
          ls -la ../out/

      - name: Upload kernel artifact
        uses: actions/upload-artifact@v4
        with:
          name: halium-kernel-${{ env.DEVICE }}-${{ github.run_number }}
          path: out/
          retention-days: 30

      - name: Create release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          name: "Halium Kernel ${{ env.DEVICE }} #${{ github.run_number }}"
          tag_name: "successful.semirelease.selene.${{ github.run_number }}"
          files: out/*
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
