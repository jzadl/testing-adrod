name: Build Halium Kernel for Selene (Redmi 10 2022)

on:
  workflow_dispatch:
  push:
    branches:
      - halium-selene

env:
  DEVICE: selene
  KERNEL_SOURCE: https://github.com/vrdons/android_kernel_xiaomi_mt6768.git
  KERNEL_BRANCH: shockwave-selene

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc bison build-essential flex libssl-dev \
            libelf-dev gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            gcc-arm-linux-gnueabi binutils-arm-linux-gnueabi \
            python3 python-is-python3 git cpio ccache \
            libncurses-dev device-tree-compiler wget

      - name: Install AOSP Clang + GCC 4.9 cross-compilers
        run: |
          mkdir -p $HOME/toolchain
          cd $HOME/toolchain
          git clone --depth=1 https://github.com/TeraaBytee/google-clang aosp_clang
          git clone --depth=1 https://github.com/TeraaBytee/aarch64-linux-android-4.9 gcc64
          git clone --depth=1 https://github.com/TeraaBytee/arm-linux-androideabi-4.9 gcc32
          echo "$HOME/toolchain/aosp_clang/bin" >> $GITHUB_PATH
          echo "$HOME/toolchain/gcc64/bin" >> $GITHUB_PATH
          echo "$HOME/toolchain/gcc32/bin" >> $GITHUB_PATH

      - name: Clone kernel source
        run: |
          git clone --depth=1 -b ${{ env.KERNEL_BRANCH }} \
            ${{ env.KERNEL_SOURCE }} kernel

      - name: Build kernel
        working-directory: kernel
        run: |
          export ARCH=arm64
          export SUBARCH=arm64
          export KBUILD_BUILD_USER=halium
          export KBUILD_BUILD_HOST=github-actions

          make O=out ${{ env.DEVICE }}_defconfig

          make -j$(nproc --all) O=out \
            CROSS_COMPILE="aarch64-linux-android-" \
            CROSS_COMPILE_ARM32="arm-linux-androideabi-" \
            CROSS_COMPILE_COMPAT="arm-linux-androideabi-" \
            CLANG_TRIPLE="aarch64-linux-gnu-" \
            CC=clang \
            LD=ld.lld

          mkdir -p ../out
          cp out/arch/arm64/boot/Image.gz-dtb ../out/ 2>/dev/null || \
          cp out/arch/arm64/boot/Image.gz ../out/ 2>/dev/null || \
          cp out/arch/arm64/boot/Image ../out/

          echo "=== Kernel build complete ==="
          ls -la ../out/

      - name: Upload kernel artifact
        uses: actions/upload-artifact@v4
        with:
          name: halium-kernel-${{ env.DEVICE }}-${{ github.run_number }}
          path: out/
          retention-days: 30

      - name: Create release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          name: "Halium Kernel ${{ env.DEVICE }} #${{ github.run_number }}"
          tag_name: "successful.semirelease.selene.${{ github.run_number }}"
          files: out/*
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
