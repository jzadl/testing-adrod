name: Build Halium Kernel for Selene (Redmi 10 2022)

on:
  workflow_dispatch:
  push:
    branches:
      - halium-selene

env:
  DEVICE: selene
  KERNEL_SOURCE: https://github.com/MiCode/Xiaomi_Kernel_OpenSource.git
  KERNEL_BRANCH: selene-r-oss

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc bison build-essential flex libssl-dev \
            libelf-dev gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            python3 python-is-python3 git cpio ccache \
            libncurses-dev device-tree-compiler

      - name: Clone kernel source
        run: |
          git clone --depth=1 -b ${{ env.KERNEL_BRANCH }} \
            ${{ env.KERNEL_SOURCE }} kernel

      - name: Fix kernel build issues
        working-directory: kernel
        run: |
          # Fix 1: Disable broken dvfsrc driver (incomplete kernel source)
          sed -i 's/^obj-$(CONFIG_MACH_MT6768)/#obj-$(CONFIG_MACH_MT6768)/' \
            drivers/devfreq/Makefile

          # Fix 2: Disable BLK_INLINE_ENCRYPTION (always_inline GCC compat)
          sed -i 's/CONFIG_BLK_INLINE_ENCRYPTION=y/# CONFIG_BLK_INLINE_ENCRYPTION is not set/' \
            arch/arm64/configs/${{ env.DEVICE }}_defconfig 2>/dev/null || true
          sed -i 's/CONFIG_BLK_CRYPTO=y/# CONFIG_BLK_CRYPTO is not set/' \
            arch/arm64/configs/${{ env.DEVICE }}_defconfig 2>/dev/null || true

          # Fix 3: Disable stackprotector strong (GCC compat)
          sed -i 's/CONFIG_CC_STACKPROTECTOR_STRONG=y/CONFIG_CC_STACKPROTECTOR=y/' \
            arch/arm64/configs/${{ env.DEVICE }}_defconfig 2>/dev/null || true

          # Fix 4: Disable -Werror at kernel level
          sed -i 's/CFLAGS_KERNEL.*-Werror//' Makefile 2>/dev/null || true
          sed -i 's/subdir-ccflags-$(CONFIG_MTK_GCOV).*-Werror/subdir-ccflags-$(CONFIG_MTK_GCOV)/' \
            arch/arm64/Makefile 2>/dev/null || true

          # Fix 5: Create stub firmware for focaltech touchscreen
          mkdir -p include/firmware
          echo "// stub" > include/firmware/fw_sample.i

          # Fix 6: Create wrapper for tools/build/cpio
          mkdir -p tools/build
          echo '#!/bin/bash' > tools/build/cpio
          echo 'exec /usr/bin/cpio "$@"' >> tools/build/cpio
          chmod +x tools/build/cpio

      - name: Build kernel
        working-directory: kernel
        run: |
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-

          make ${{ env.DEVICE }}_defconfig
          make -j$(nproc --all)

          mkdir -p ../out
          cp arch/arm64/boot/Image.gz-dtb ../out/ 2>/dev/null || \
          cp arch/arm64/boot/Image.gz ../out/ 2>/dev/null || \
          cp arch/arm64/boot/Image ../out/

          echo "=== Kernel build complete ==="
          ls -la ../out/

      - name: Upload kernel artifact
        uses: actions/upload-artifact@v4
        with:
          name: halium-kernel-${{ env.DEVICE }}-${{ github.run_number }}
          path: out/
          retention-days: 30

      - name: Create release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          name: "Halium Kernel ${{ env.DEVICE }} #${{ github.run_number }}"
          tag_name: "successful.semirelease.selene.${{ github.run_number }}"
          files: out/*
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
