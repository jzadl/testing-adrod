name: Build Halium Kernel for Selene (Redmi 10 2022)

on:
  workflow_dispatch:
  push:
    branches:
      - halium-selene

env:
  DEVICE: selene
  KERNEL_SOURCE: https://github.com/vrdons/android_kernel_xiaomi_mt6768.git
  KERNEL_BRANCH: shockwave-selene

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc bison build-essential flex libssl-dev \
            libelf-dev gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            gcc-arm-linux-gnueabi binutils-arm-linux-gnueabi \
            python3 python-is-python3 git cpio ccache \
            libncurses-dev device-tree-compiler wget

      - name: Install Clang r596125
        run: |
          mkdir -p $HOME/clang
          cd $HOME/clang
          wget -q -O clang.tar.gz \
            https://github.com/MrShockWAVEog/Google-Clang-Mirror/releases/download/clang-r596125-aosp/clang.tar.gz
          tar -xf clang.tar.gz
          rm clang.tar.gz
          echo "$HOME/clang/bin" >> $GITHUB_PATH

      - name: Clone kernel source
        run: |
          git clone --depth=1 -b ${{ env.KERNEL_BRANCH }} \
            ${{ env.KERNEL_SOURCE }} kernel

      - name: Fix defconfig
        working-directory: kernel
        run: |
          sed -i 's/CONFIG_CC_STACKPROTECTOR_STRONG=y/CONFIG_CC_STACKPROTECTOR=y/' \
            arch/arm64/configs/${{ env.DEVICE }}_defconfig
          sed -i 's/CONFIG_BLK_INLINE_ENCRYPTION=y/# CONFIG_BLK_INLINE_ENCRYPTION is not set/' \
            arch/arm64/configs/${{ env.DEVICE }}_defconfig
          sed -i 's/CONFIG_BLK_INLINE_ENCRYPTION_FALLBACK=y/# CONFIG_BLK_INLINE_ENCRYPTION_FALLBACK is not set/' \
            arch/arm64/configs/${{ env.DEVICE }}_defconfig
          sed -i 's/CONFIG_IKHEADERS=y/# CONFIG_IKHEADERS is not set/' \
            arch/arm64/configs/${{ env.DEVICE }}_defconfig

      - name: Fix source code issues
        working-directory: kernel
        run: |
          # Remove stray #endif after _mtk_charger_change_current_setting
          sed -i '/_mtk_charger_change_current_setting/{n;/^#endif$/d}' \
            drivers/power/supply/mediatek/charger/mtk_charger.c

      - name: Add swap
        run: |
          sudo swapon --show
          if ! swapon --show | grep -q /swapfile; then
            sudo dd if=/dev/zero of=/swapfile bs=1M count=8192 status=progress
            sudo chmod 600 /swapfile
            sudo mkswap /swapfile
            sudo swapon /swapfile
          fi
          free -h

      - name: Build kernel
        working-directory: kernel
        continue-on-error: true
        id: build
        run: |
          export ARCH=arm64
          export SUBARCH=arm64
          export KBUILD_BUILD_USER=halium
          export KBUILD_BUILD_HOST=github-actions

          make O=out ${{ env.DEVICE }}_defconfig

          make -j2 O=out \
            LLVM=1 LLVM_IAS=1 \
            CROSS_COMPILE="aarch64-linux-gnu-" \
            CROSS_COMPILE_ARM32="arm-linux-gnueabi-" \
            CLANG_TRIPLE="aarch64-linux-gnu-" 2>&1 | tee build.log

          mkdir -p ../out
          cp out/arch/arm64/boot/Image.gz-dtb ../out/ 2>/dev/null || \
          cp out/arch/arm64/boot/Image.gz ../out/ 2>/dev/null || \
          cp out/arch/arm64/boot/Image ../out/

          echo "=== Kernel build complete ==="
          ls -la ../out/

      - name: Upload kernel artifact
        uses: actions/upload-artifact@v4
        with:
          name: halium-kernel-${{ env.DEVICE }}-${{ github.run_number }}
          path: out/
          retention-days: 30

      - name: Create release
        if: steps.build.outcome == 'success'
        uses: softprops/action-gh-release@v2
        with:
          name: "Halium Kernel ${{ env.DEVICE }} #${{ github.run_number }}"
          tag_name: "successful.semirelease.selene.${{ github.run_number }}"
          files: out/*
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Telegram on success
        if: steps.build.outcome == 'success'
        shell: bash
        run: |
          esc() { sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g'; }

          CHAT="${{ secrets.TELEGRAM_CHAT_ID }}"
          BOT="${{ secrets.TELEGRAM_BOT_TOKEN }}"
          RUN="${{ github.run_number }}"
          RUN_ID="${{ github.run_id }}"
          REPO="${{ github.repository }}"
          ACTOR="${{ github.actor }}"
          REF="${{ github.ref_name }}"

          SHA_SHORT=$(git rev-parse --short HEAD 2>/dev/null || echo "N/A")
          SHA_FULL=$(git rev-parse HEAD 2>/dev/null || echo "N/A")
          COMMIT_MSG=$(git log -1 --format=%s 2>/dev/null | esc || echo "N/A")

          K_COMMIT=$(cd kernel && git rev-parse --short HEAD 2>/dev/null || echo "N/A")
          K_FULL=$(cd kernel && git rev-parse HEAD 2>/dev/null || echo "N/A")
          KVER=$(cd kernel && make O=out kernelversion 2>/dev/null | head -1 || echo "N/A")

          IMG=$(ls out/ 2>/dev/null | head -1 || echo "N/A")
          IMG_SIZE=$(du -h "out/$IMG" 2>/dev/null | cut -f1 || echo "N/A")
          IMG_SHA=$(sha256sum "out/$IMG" 2>/dev/null | cut -d' ' -f1 || echo "N/A")
          IMG_SHA_SHORT=$(echo "$IMG_SHA" | cut -c1-16)

          CLANG_VER=$(clang --version 2>/dev/null | head -1 || echo "N/A")

          MSG=$(cat <<EOF
✅ <b>Selene Kernel Build #$RUN</b>

<b>Device:</b> Xiaomi Redmi 10 2022 (selene)
<b>SoC:</b> MediaTek MT6768 (Helio G88)
<b>Kernel version:</b> $KVER
<b>Source:</b> vrdons/android_kernel_xiaomi_mt6768
<b>Branch:</b> shockwave-selene
<b>Kernel commit:</b> <code>$K_COMMIT</code>
<b>Full kernel commit:</b> <code>$K_FULL</code>
<b>Toolchain:</b> $CLANG_VER
<b>Defconfig:</b> selene_defconfig
<b>Build flags:</b> LLVM=1 LLVM_IAS=1 -j2

<b>Image:</b> <code>$IMG</code> ($IMG_SIZE)
<b>SHA256 (short):</b> <code>$IMG_SHA_SHORT</code>
<b>SHA256 (full):</b> <code>$IMG_SHA</code>

<b>Release tag:</b> successful.semirelease.selene.$RUN
<b>Artifact:</b> halium-kernel-selene-$RUN

<b>Repo commit:</b> <code>$SHA_SHORT</code>
<b>Repo commit (full):</b> <code>$SHA_FULL</code>
<b>Commit msg:</b> $COMMIT_MSG
<b>Triggered by:</b> $ACTOR
<b>Branch:</b> $REF

<a href="https://github.com/$REPO/actions/runs/$RUN_ID">🔗 View run on GitHub</a>
EOF
          )

          jq -n --arg chat_id "$CHAT" --arg text "$MSG" \
            '{chat_id: $chat_id, text: $text, parse_mode: "HTML", disable_web_page_preview: true}' \
            > /tmp/tg.json

          curl -s -X POST "https://api.telegram.org/bot$BOT/sendMessage" \
            -H "Content-Type: application/json" -d @/tmp/tg.json

      - name: Notify Telegram on failure
        if: steps.build.outcome == 'failure'
        shell: bash
        run: |
          esc() { sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g'; }

          CHAT="${{ secrets.TELEGRAM_CHAT_ID }}"
          BOT="${{ secrets.TELEGRAM_BOT_TOKEN }}"
          RUN="${{ github.run_number }}"
          RUN_ID="${{ github.run_id }}"
          REPO="${{ github.repository }}"
          ACTOR="${{ github.actor }}"
          REF="${{ github.ref_name }}"

          SHA_SHORT=$(git rev-parse --short HEAD 2>/dev/null || echo "N/A")
          COMMIT_MSG=$(git log -1 --format=%s 2>/dev/null | esc || echo "N/A")

          K_COMMIT=$(cd kernel && git rev-parse --short HEAD 2>/dev/null || echo "N/A")
          K_FULL=$(cd kernel && git rev-parse HEAD 2>/dev/null || echo "N/A")

          if [ -f kernel/build.log ]; then
            ERR=$(tail -25 kernel/build.log 2>/dev/null | esc)
          else
            ERR="No build log found (build may have failed before compilation)"
          fi

          MSG=$(cat <<EOF
❌ <b>Selene Kernel Build #$RUN FAILED</b>

<b>Device:</b> Xiaomi Redmi 10 2022 (selene)
<b>SoC:</b> MediaTek MT6768 (Helio G88)
<b>Source:</b> vrdons/android_kernel_xiaomi_mt6768
<b>Branch:</b> shockwave-selene
<b>Kernel commit:</b> <code>$K_COMMIT</code>
<b>Full kernel commit:</b> <code>$K_FULL</code>
<b>Defconfig:</b> selene_defconfig
<b>Build flags:</b> LLVM=1 LLVM_IAS=1 -j2

<b>Repo commit:</b> <code>$SHA_SHORT</code>
<b>Commit msg:</b> $COMMIT_MSG
<b>Triggered by:</b> $ACTOR
<b>Branch:</b> $REF

<b>Last 25 lines of build.log:</b>
<pre>$ERR</pre>

<a href="https://github.com/$REPO/actions/runs/$RUN_ID">🔗 View run on GitHub</a>
EOF
          )

          jq -n --arg chat_id "$CHAT" --arg text "$MSG" \
            '{chat_id: $chat_id, text: $text, parse_mode: "HTML", disable_web_page_preview: true}' \
            > /tmp/tg.json

          curl -s -X POST "https://api.telegram.org/bot$BOT/sendMessage" \
            -H "Content-Type: application/json" -d @/tmp/tg.json
