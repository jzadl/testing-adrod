name: GLUE-MAIN

on:
  workflow_dispatch:
  push:
    branches:
      - halium-selene
    paths:
      - 'dts/**'
      - 'vendor/**'
      - 'scripts/**'
      - '.github/workflows/GLUE-MAIN.yml'

env:
  DEVICE: selene
  CODENAME: selene
  VENDOR: xiaomi
  LUNCH_COMBO: halium_selene-userdebug
  HALIUM_VERSION: halium-11.0

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache \
            /usr/local/.ghcup /usr/share/swift /usr/local/share/powershell \
            /usr/local/share/chromium /usr/share/miniconda /usr/local/share/boost \
            /usr/share/az_* /opt/az 2>/dev/null || true
          sudo apt-get clean
          df -h

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc bison build-essential ccache curl flex \
            git-core gnupg gperf imagemagick lib32ncurses5-dev \
            lib32readline-dev lib32z1-dev liblz4-tool libncurses5 \
            libncurses5-dev libpcre3-dev libsdl1.2-dev libssl-dev \
            libxml2 libxml2-utils lzop pngcrush rsync schedtool \
            squashfs-tools xsltproc zip zlib1g-dev \
            python3 python-is-python3 repo cpio openjdk-11-jdk \
            patchelf

      - name: Configure ccache
        run: |
          ccache -M 5G
          echo "CCACHE_DIR=~/.ccache" >> $GITHUB_ENV

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-selene-${{ github.run_number }}
          restore-keys: |
            ccache-selene-

      - name: Configure git identity
        run: |
          git config --global user.email "ci@halium.build"
          git config --global user.name "Halium CI"

      - name: Initialize Halium source tree
        run: |
          mkdir -p halium && cd halium
          repo init -u https://github.com/Halium/android -b ${{ env.HALIUM_VERSION }} --depth=1
          repo sync -c -j$(nproc --all) --no-tags --force-sync

      - name: Place device tree
        working-directory: halium
        run: |
          mkdir -p device/${{ env.VENDOR }}/${{ env.DEVICE }}
          cp -r ${{ github.workspace }}/dts/* device/${{ env.VENDOR }}/${{ env.DEVICE }}/
          mkdir -p vendor/${{ env.VENDOR }}/${{ env.DEVICE }}
          cp ${{ github.workspace }}/vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/proprietary-files.txt \
            vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/ 2>/dev/null || true
          cp ${{ github.workspace }}/vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/selene-vendor.mk \
            vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/ 2>/dev/null || true
          cp ${{ github.workspace }}/vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/BoardConfigVendor.mk \
            vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/ 2>/dev/null || true

      - name: Extract vendor blobs
        working-directory: halium
        run: |
          gh release download vendor-blobs-selene --pattern "vendor_a.img" --dir /tmp/ 2>&1
          sudo mkdir -p /tmp/vendor_mnt
          sudo mount -o ro,loop /tmp/vendor_a.img /tmp/vendor_mnt
          PROP_LIST="vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/proprietary-files.txt"
          DEST="vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/proprietary"
          mkdir -p "$DEST"
          while IFS= read -r line; do
            [[ -z "$line" || "$line" =~ ^# || "$line" =~ ^- ]] && continue
            src_path="${line%%|*}"
            [[ "$src_path" == *"/vintf/"* || "$src_path" == *".apk" || "$src_path" == *".jar" ]] && continue
            src_full="/tmp/vendor_mnt/$src_path"
            dst_full="$DEST/$src_path"
            if [ -f "$src_full" ]; then
              mkdir -p "$(dirname "$dst_full")"
              cp "$src_full" "$dst_full"
            fi
          done < "$PROP_LIST"
          sudo umount /tmp/vendor_mnt
          rm /tmp/vendor_a.img
          sudo chown -R $(id -u):$(id -g) "$DEST/"
          sudo chmod -R u+rwx "$DEST/"
          rm -rf "$DEST/lost+found"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Patch vendor blobs
        working-directory: halium
        run: |
          DEST="vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/proprietary"
          bash ${{ github.workspace }}/scripts/patch-vendor-blobs.sh "$DEST"
          for lib in libshim_audio.so libshim_beanpod.so libshim_showlogo.so libshim_vtservice.so; do
            if [ -d "$DEST/vendor/lib64" ]; then
              find "$DEST" -name "$lib" -exec cp {} "$DEST/vendor/lib64/" \; 2>/dev/null || true
            fi
          done
          for arch in lib lib64; do
            for lib in utils ui; do
              SHIM_NAME="lib${lib}-v32.so"
              REAL_LIB=""
              for p in "$DEST/vendor/$arch" "$DEST/$arch" "$DEST/system/$arch"; do
                if [ -f "$p/lib${lib}.so" ]; then REAL_LIB="$p/lib${lib}.so"; break; fi
              done
              if [ -n "$REAL_LIB" ]; then
                mkdir -p "$DEST/vendor/$arch"
                cp "$REAL_LIB" "$DEST/vendor/$arch/$SHIM_NAME" 2>/dev/null || true
              fi
            done
          done

      - name: Install VINTF manifest
        working-directory: halium
        run: |
          DEST="vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/proprietary"
          mkdir -p "$DEST/etc/vintf/manifest"
          cp ${{ github.workspace }}/dts/manifest.xml "$DEST/etc/vintf/manifest/manifest_${{ env.DEVICE }}.xml"

      - name: Filter proprietary-files.txt
        working-directory: halium
        run: |
          PROP="vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/proprietary-files.txt"
          DEST="vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/proprietary"
          FILTERED=$(mktemp)
          while IFS= read -r line; do
            [[ -z "$line" || "$line" == \#* ]] && echo "$line" >> "$FILTERED" && continue
            [[ "$line" == -* ]] && echo "$line" >> "$FILTERED" && continue
            src="${line%%|*}"
            if [ -f "$DEST/$src" ]; then echo "$line" >> "$FILTERED"; fi
          done < "$PROP"
          cp "$FILTERED" "$PROP"
          rm "$FILTERED"

      - name: Generate vendor makefile
        working-directory: halium
        run: |
          python3 ${{ github.workspace }}/scripts/generate_vendor_mk.py \
            vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/proprietary-files.txt \
            vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/selene-vendor-files.mk

      - name: Download prebuilt kernel
        working-directory: halium
        run: |
          for i in 1 2 3 4 5; do
            TAG=$(gh release list --limit=50 --json tagName,name -q '.[] | select(.tagName | test("successful\\.semirelease\\.selene")) | .tagName' 2>/dev/null | head -1)
            if [ -n "$TAG" ]; then break; fi
            sleep 30
          done
          if [ -z "$TAG" ]; then exit 1; fi
          mkdir -p device/${{ env.VENDOR }}/${{ env.DEVICE }}/prebuilt
          gh release download "$TAG" --pattern "Image.gz-dtb" --dir device/${{ env.VENDOR }}/${{ env.DEVICE }}/prebuilt/
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clone MTK sepolicy
        working-directory: halium
        run: |
          git clone --depth=1 -b eleven \
            https://github.com/PixelExperience/device_mediatek_sepolicy_vndr.git \
            device/mediatek/sepolicy_vndr 2>/dev/null || true

      - name: Apply Hybris patches
        working-directory: halium
        run: ./hybris-patches/apply-patches.sh --mb

      - name: Patch import-namespace
        working-directory: halium
        run: |
          python3 - << 'PYEOF'
          try:
              with open('build/core/node_fns.mk', 'r') as f: content = f.read()
              content = content.replace('$(error import of "$(2)" failed)', '')
              with open('build/core/node_fns.mk', 'w') as f: f.write(content)
          except FileNotFoundError: pass
          PYEOF

      - name: Fix Soong Make variables
        working-directory: halium
        run: |
          if [ -f "vendor/lineage/build/soong/Android.bp" ]; then
            python3 - << 'PYEOF'
          import re
          with open('vendor/lineage/build/soong/Android.bp') as f: c = f.read()
          c2 = re.sub(r'\$\([A-Z_]+\)', '', c)
          with open('vendor/lineage/build/soong/Android.bp', 'w') as f: f.write(c2)
          PYEOF
          fi

      - name: Clone halium-boot repo
        working-directory: halium
        run: git clone --depth=1 https://github.com/Halium/halium-boot.git vendor/halium/halium-boot

      - name: Allow mkbootimg
        working-directory: halium
        run: |
          CONFIG="build/soong/ui/build/paths/config.go"
          if [ -f "$CONFIG" ]; then
            python3 -c "
          import sys
          with open('$CONFIG') as f: c = f.read()
          if '\"mkbootimg\"' in c and 'mkbootimg\": true' in c:
              print('mkbootimg already allowed'); sys.exit(0)
          if '\"mke2fs\": true,' in c:
              c = c.replace('\"mke2fs\": true,', '\"mke2fs\": true,\n\t\t\"mkbootimg\": true,')
          elif '\"mke2fs\"' in c:
              c = c.replace('\"mke2fs\",', '\"mke2fs\",\n\t\t\"mkbootimg\": true,')
          else:
              # Fallback: insert after first true,
              c = c.replace('true,\n', 'true,\n\t\t\"mkbootimg\": true,\n', 1)
          with open('$CONFIG', 'w') as f: f.write(c)
          print('mkbootimg added to allowlist')
          "
          fi

      - name: Remove broken test files
        working-directory: halium
        run: |
          rm -f platform_testing/build/tasks/tests/instrumentation_test_list.mk
          rm -f platform_testing/build/tasks/continuous_instrumentation_tests.mk
          rm -f platform_testing/build/tasks/continuous_native_tests.mk

      - name: Patch bootloader_message
        working-directory: halium
        run: |
          HEADER="bootable/recovery/bootloader_message/include/bootloader_message/bootloader_message.h"
          python3 -c "
          with open('$HEADER', 'r') as f: content = f.read()
          if 'BOARD_RECOVERY_BLDRMSG_OFFSET' in content and '#define BOARD_RECOVERY_BLDRMSG_OFFSET' not in content:
              content = '#ifndef BOARD_RECOVERY_BLDRMSG_OFFSET\n#define BOARD_RECOVERY_BLDRMSG_OFFSET 0x00000000\n#endif\n\n' + content
              with open('$HEADER', 'w') as f: f.write(content)
          "

      - name: Setup build environment
        working-directory: halium
        run: |
          source build/envsetup.sh
          lunch ${{ env.LUNCH_COMBO }}

      - name: Download initramfs
        working-directory: halium
        run: |
          INITRD_CACHE="vendor/halium/halium-boot/initrd-cache.img"
          mkdir -p "$(dirname "$INITRD_CACHE")"
          curl --location "https://github.com/halium/initramfs-tools-halium/releases/download/continuous/initrd.img-touch-arm64" \
            --output "$INITRD_CACHE" --silent
          printf '#!/bin/bash\nARCH=$1\nTARGET=$2\ncp "$(dirname "$0")/initrd-cache.img" "$TARGET"\necho "Using cached initramfs"\n' > vendor/halium/halium-boot/get-initrd.sh
          chmod +x vendor/halium/halium-boot/get-initrd.sh

      - name: Build halium-boot
        working-directory: halium
        run: |
          source build/envsetup.sh
          lunch ${{ env.LUNCH_COMBO }}
          export USE_CCACHE=1 CCACHE_DIR=~/.ccache USE_HOST_LEX=yes
          mka mkbootimg
          mka halium-boot -j$(nproc --all)

      - name: Free disk before systemimage
        working-directory: halium
        run: |
          rm -rf vendor/halium/halium-boot 2>/dev/null || true
          rm -rf out/target/product/${{ env.DEVICE }}/obj/ROOT/halium-boot_intermediates 2>/dev/null || true
          rm -rf out/target/product/${{ env.DEVICE }}/obj/EMBEDDED_INITRAMFS 2>/dev/null || true
          df -h

      - name: Build system image
        working-directory: halium
        run: |
          source build/envsetup.sh
          lunch ${{ env.LUNCH_COMBO }}
          export USE_CCACHE=1 CCACHE_DIR=~/.ccache USE_HOST_LEX=yes
          mka systemimage -j$(nproc --all) 2>&1 | tee /tmp/build-system.log; exit ${PIPESTATUS[0]}

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: halium-${{ env.DEVICE }}-logs-${{ github.run_number }}
          path: /tmp/build-system.log
          retention-days: 7
          if-no-files-found: ignore

      - name: Collect output
        working-directory: halium
        run: |
          mkdir -p ../out
          cp out/target/product/${{ env.DEVICE }}/halium-boot.img ../out/ 2>/dev/null || true
          cp out/target/product/${{ env.DEVICE }}/system.img ../out/ 2>/dev/null || true
          ls -la ../out/

      - name: Create release
        if: success()
        run: |
          TAG="successful.release.selene.halium11.${{ github.run_number }}"
          for i in 1 2 3 4 5; do
            gh release delete "$TAG" --repo ${{ github.repository }} --yes --cleanup-tag 2>/dev/null || true
            sleep 5
            gh release create "$TAG" --repo ${{ github.repository }} \
              --title "Halium 11 ${{ env.DEVICE }} #${{ github.run_number }}" \
              out/* --latest && exit 0
            sleep 30
          done
          exit 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Telegram on success
        if: success()
        run: |
          CHAT="${{ secrets.TELEGRAM_CHAT_ID }}"
          BOT="${{ secrets.TELEGRAM_BOT_TOKEN }}"
          RUN="${{ github.run_number }}"
          curl -s -X POST "https://api.telegram.org/bot$BOT/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"$CHAT\",\"text\":\"GLUE-MAIN #$RUN OK\",\"parse_mode\":\"HTML\"}"

      - name: Notify Telegram on failure
        if: failure()
        run: |
          CHAT="${{ secrets.TELEGRAM_CHAT_ID }}"
          BOT="${{ secrets.TELEGRAM_BOT_TOKEN }}"
          RUN="${{ github.run_number }}"
          ERRORS=$(grep -E "FAILED:|error:" /tmp/build-system.log 2>/dev/null | tail -10 || echo "Check logs")
          curl -s -X POST "https://api.telegram.org/bot$BOT/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"$CHAT\",\"text\":\"GLUE-MAIN #$RUN FAILED\n\n$ERRORS\",\"parse_mode\":\"HTML\"}"